function deepMerge(def, loaded) {
  if (!loaded || typeof loaded !== "object") return def;
  const out = { ...def };
  for (const k of Object.keys(def)) {
    if (Array.isArray(def[k])) out[k] = Array.isArray(loaded[k]) ? loaded[k] : def[k];
    else if (def[k] && typeof def[k] === "object") out[k] = { ...def[k], ...(loaded[k] || {}) };
    else out[k] = k in loaded ? loaded[k] : def[k];
  }
  return out;
}

const uid = () => (crypto.randomUUID ? crypto.randomUUID() : String(Date.now() + Math.random()));

function fmtDate(d) {
  if (!d) return "";
  const dt = new Date(d + (d.length <= 10 ? "T00:00:00" : ""));
  if (isNaN(dt)) return d;
  return dt.toLocaleDateString(undefined, { month: "short", day: "numeric", year: "numeric" });
}
function fmtTime(t) {
  if (!t) return "";
  const [h, m] = t.split(":").map(Number);
  const ap = h >= 12 ? "PM" : "AM";
  const h12 = h % 12 === 0 ? 12 : h % 12;
  return `${h12}:${String(m).padStart(2, "0")} ${ap}`;
}
function ageString(dob) {
  if (!dob) return "";
  const birth = new Date(dob + "T00:00:00");
  const now = new Date();
  let days = Math.floor((now - birth) / 86400000);
  if (days < 0) {
    const untilDays = Math.abs(days);
    return `due in ${untilDays} day${untilDays === 1 ? "" : "s"}`;
  }
  if (days < 60) {
    const weeks = Math.floor(days / 7);
    const rem = days % 7;
    return `${weeks}w ${rem}d old`;
  }
  const months = Math.floor(days / 30.44);
  return `${months} month${months === 1 ? "" : "s"} old`;
}
function minutesBetween(start, end) {
  if (!start || !end) return null;
  const [sh, sm] = start.split(":").map(Number);
  const [eh, em] = end.split(":").map(Number);
  let mins = (eh * 60 + em) - (sh * 60 + sm);
  if (mins < 0) mins += 24 * 60;
  return mins;
}
function durLabel(mins) {
  if (mins == null) return "";
  const h = Math.floor(mins / 60);
  const m = mins % 60;
  return h > 0 ? `${h}h ${m}m` : `${m}m`;
}

function Foot({ size = 18, color = "currentColor" }) {

      <ellipse cx="18.8" cy="6.2" rx="2" ry="2.6" transform="rotate(18 18.8 6.2)" />
    </svg>
  );
}
function Btn({ children, variant = "primary", onClick, disabled, type = "button", full }) {
  return (
    <button type={type} disabled={disabled} onClick={onClick} className={`btn btn-${variant}${full ? " btn-full" : ""}`}>

}
function IconBtn({ children, onClick, variant = "" }) {

}
function Card({ children, onClick }) {

function Sheet({ onClose, children }) {

/* ---------- Generic field + form ---------- */
function FieldInput({ field, value, onChange }) {
  const { key, type, options, label } = field;
  if (type === "textarea")
    return <textarea rows={3} value={value || ""} onChange={(e) => onChange(key, e.target.value)} />;
  if (type === "select")
    return (
      <select value={value || ""} onChange={(e) => onChange(key, e.target.value)}>
        <option value="">Select…</option>
        {options.map((o) => (
          <option key={o} value={o}>{o}</option>
        ))}
      </select>
    );
  return (
    <input
      type={type}
      value={value || ""}
      onChange={(e) => onChange(key, e.target.value)}
      placeholder={type === "number" ? "0" : ""}
    />
  );
}
function EntryForm({ fields, initial, title, onCancel, onSave }) {
  const [vals, setVals] = useState(initial || {});
  const set = (k, v) => setVals((s) => ({ ...s, [k]: v }));
  return (
    <>
      <div className="sheet-head">
        <h3>{title}</h3>
        <IconBtn onClick={onCancel}>✕</IconBtn>
      </div>
      <div className="sheet-body">
        {fields.map((f) => (
          <label className="field" key={f.key}>
            <span>{f.label}{f.required ? " *" : ""}</span>
            <FieldInput field={f} value={vals[f.key]} onChange={set} />
          </label>
        ))}
      </div>
      <div className="sheet-actions">
        <Btn variant="ghost" onClick={onCancel}>Cancel</Btn>
        <Btn
          onClick={() => {
            if (fields.some((f) => f.required && !vals[f.key])) {
              alert("Please fill in the required fields.");
              return;
            }
            onSave({ ...vals, id: vals.id || uid() });
          }}
        >
          Save
        </Btn>
      </div>
    </>
  );
}

/* ---------- Generic list section (config-driven) ---------- */
function ListSection({ title, icon, items, fields, sortKey = "date", renderTitle, renderSub, tone, onAdd, onDelete, emptyText }) {
  const [showForm, setShowForm] = useState(false);
  const sorted = useMemo(
    () => [...items].sort((a, b) => String(b[sortKey] || "").localeCompare(String(a[sortKey] || ""))),
    [items, sortKey]
  );
  return (
    <div className="screen">
      <div className="screen-head">
        <h2>{icon} {title}</h2>
        <Btn onClick={() => setShowForm(true)}>+ Add</Btn>
      </div>
      {sorted.length === 0 && <EmptyState text={emptyText} />}
      <div className="list">
        {sorted.map((item) => (
          <Card key={item.id}>
            <div className="row">
              <div className="grow">
                <div className="item-title">{renderTitle(item)}</div>
                <div className="item-sub">{renderSub ? renderSub(item) : fmtDate(item[sortKey])}</div>
              </div>
              {tone && <Badge tone={tone(item)}>{tone(item)}</Badge>}
              <IconBtn variant="danger" onClick={() => onDelete(item.id)}>✕</IconBtn>
            </div>
            {item.notes && <div className="item-notes">{item.notes}</div>}
          </Card>
        ))}
      </div>
      {showForm && (
        <Sheet onClose={() => setShowForm(false)}>
          <EntryForm
            fields={fields}
            title={`Add ${title}`}
            onCancel={() => setShowForm(false)}
            onSave={(v) => { onAdd(v); setShowForm(false); }}
          />
        </Sheet>
      )}
    </div>
  );
}

function MoreScreen({ setView }) {
  return (
    <div className="screen">
      <div className="screen-head"><h2>More</h2></div>
      <div className="grid">
        {MORE_ITEMS.map((m) => (
          <button key={m.key} className="grid-tile" onClick={() => setView(m.key)}>
            <span className="grid-icon">{m.icon}</span>
            <span>{m.label}</span>
          </button>
        ))}
      </div>
    </div>
  );
}

/* ---------- Journal (custom: author select + photo) ---------- */
function JournalScreen({ items, profile, onAdd, onDelete }) {
  const [showForm, setShowForm] = useState(false);
  const [vals, setVals] = useState({ date: "", author: "", text: "", photo: null });
  const sorted = useMemo(() => [...items].sort((a, b) => String(b.date || "").localeCompare(String(a.date || ""))), [items]);
  const authors = [profile.parent1 || "Parent 1", profile.parent2 || "Parent 2"];

  function handlePhoto(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      const img = new Image();
      img.onload = () => {
        const scale = Math.min(1, 700 / img.width);
        const canvas = document.createElement("canvas");
        canvas.width = img.width * scale;
        canvas.height = img.height * scale;
        const ctx = canvas.getContext("2d");
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        setVals((s) => ({ ...s, photo: canvas.toDataURL("image/jpeg", 0.7) }));
      };
      img.src = reader.result;
    };
    reader.readAsDataURL(file);
  }

  return (
    <div className="screen">
      <div className="screen-head">
        <h2>📓 Journal</h2>
        <Btn onClick={() => { setVals({ date: new Date().toISOString().slice(0, 10), author: "", text: "", photo: null }); setShowForm(true); }}>+ Add</Btn>
      </div>
      {sorted.length === 0 && <EmptyState text="No journal entries yet. Capture your first memory together." />}
      <div className="list">
        {sorted.map((item) => (
          <Card key={item.id}>
            <div className="row">
              <div className="grow">
                <div className="item-title">{item.author || "—"}</div>
                <div className="item-sub">{fmtDate(item.date)}</div>
              </div>
              <IconBtn variant="danger" onClick={() => onDelete(item.id)}>✕</IconBtn>
            </div>
            {item.photo && <img src={item.photo} className="journal-photo" alt="" />}
            {item.text && <div className="item-notes">{item.text}</div>}
          </Card>
        ))}
      </div>
      {showForm && (
        <Sheet onClose={() => setShowForm(false)}>
          <div className="sheet-head"><h3>Add journal entry</h3><IconBtn onClick={() => setShowForm(false)}>✕</IconBtn></div>
          <div className="sheet-body">
            <label className="field"><span>Date</span><input type="date" value={vals.date} onChange={(e) => setVals((s) => ({ ...s, date: e.target.value }))} /></label>
            <label className="field">
              <span>Who's writing?</span>
              <select value={vals.author} onChange={(e) => setVals((s) => ({ ...s, author: e.target.value }))}>
                <option value="">Select…</option>
                {authors.map((a) => <option key={a} value={a}>{a}</option>)}
              </select>
            </label>
            <label className="field"><span>Entry</span><textarea rows={4} value={vals.text} onChange={(e) => setVals((s) => ({ ...s, text: e.target.value }))} /></label>
            <label className="field"><span>Photo (optional)</span><input type="file" accept="image/*" onChange={handlePhoto} /></label>
            {vals.photo && <img src={vals.photo} className="journal-photo" alt="" />}
          </div>
          <div className="sheet-actions">
            <Btn variant="ghost" onClick={() => setShowForm(false)}>Cancel</Btn>
            <Btn onClick={() => { if (!vals.text) return alert("Please write something first."); onAdd({ ...vals, id: uid() }); setShowForm(false); }}>Save</Btn>
          </div>
        </Sheet>
      )}
    </div>
  );
}

/* ---------- Sleep ---------- */
function SleepScreen({ items, active, onAdd, onDelete, onStart, onStop }) {
  const sorted = useMemo(() => [...items].sort((a, b) => String(b.date || "").localeCompare(String(a.date || ""))), [items]);
  const [showForm, setShowForm] = useState(false);
  return (
    <div className="screen">
      <div className="screen-head"><h2>😴 Sleep</h2><Btn onClick={() => setShowForm(true)}>+ Add</Btn></div>

      {active ? (
        <Card>
          <div className="row">
            <div className="grow">
              <div className="item-title">Currently asleep ({active.type})</div>
              <div className="item-sub">Started {fmtTime(active.start)}</div>
            </div>
            <Btn variant="danger" onClick={onStop}>Wake up</Btn>
          </div>
        </Card>
      ) : (
        <Card>
          <div className="row">
            <div className="grow"><div className="item-title">Not currently sleeping</div></div>
            <div className="quick-actions">
              <Btn variant="ghost" onClick={() => onStart("Nap")}>Start nap</Btn>
              <Btn variant="ghost" onClick={() => onStart("Night")}>Start night sleep</Btn>
            </div>
          </div>
        </Card>
      )}

      {sorted.length === 0 && <EmptyState text="No sleep logged yet." />}
      <div className="list">
        {sorted.map((item) => {
          const mins = minutesBetween(item.start, item.end);
          return (
            <Card key={item.id}>
              <div className="row">
                <div className="grow">
                  <div className="item-title">{item.type} · {fmtTime(item.start)}{item.end ? ` – ${fmtTime(item.end)}` : ""}</div>
                  <div className="item-sub">{fmtDate(item.date)}{mins != null ? ` · ${durLabel(mins)}` : ""}</div>
                </div>
                <IconBtn variant="danger" onClick={() => onDelete(item.id)}>✕</IconBtn>
              </div>
            </Card>
          );
        })}
      </div>
      {showForm && (
        <Sheet onClose={() => setShowForm(false)}>
          <EntryForm fields={SLEEP_FIELDS} title="Add sleep" onCancel={() => setShowForm(false)} onSave={(v) => { onAdd(v); setShowForm(false); }} />
        </Sheet>
      )}
    </div>
  );
}

/* ---------- Feeding (nursing + solids sub-tabs) ---------- */
function FeedingScreen({ nursing, solids, onAddNursing, onDeleteNursing, onAddSolid, onDeleteSolid }) {
  const [sub, setSub] = useState("nursing");
  const lastNursing = useMemo(
    () => [...nursing].sort((a, b) => `${b.date}${b.time}`.localeCompare(`${a.date}${a.time}`))[0],
    [nursing]
  );
  const nextSide = lastNursing?.side === "Left" ? "Right" : lastNursing?.side === "Right" ? "Left" : null;

  return (
    <div className="screen">
      <div className="screen-head"><h2>🍼 Feeding</h2></div>
      <div className="subtabs">
        <button className={sub === "nursing" ? "subtab active" : "subtab"} onClick={() => setSub("nursing")}>Nursing</button>
        <button className={sub === "solids" ? "subtab active" : "subtab"} onClick={() => setSub("solids")}>Solid foods</button>
      </div>

      {sub === "nursing" && (
        <>
          {nextSide && (
            <div className="hint-banner"><Foot size={14} /> Last side was {lastNursing.side} — try <strong>{nextSide}</strong> next.</div>
          )}
          <ListSection
            title="Nursing" icon="" items={nursing} fields={NURSING_FIELDS}
            renderTitle={(i) => `${i.side || "Feeding"}${i.duration ? ` · ${i.duration} min` : ""}`}
            renderSub={(i) => `${fmtDate(i.date)} · ${fmtTime(i.time)}`}
            onAdd={onAddNursing} onDelete={onDeleteNursing}
            emptyText="No nursing sessions logged yet."
          />
        </>
      )}
      {sub === "solids" && (
        <ListSection
          title="Solid foods" icon="" items={solids} fields={SOLIDS_FIELDS}
          renderTitle={(i) => `${i.food}${i.reaction ? ` — ${i.reaction}` : ""}`}
          onAdd={onAddSolid} onDelete={onDeleteSolid}
          emptyText="No solid foods logged yet."
        />
      )}
    </div>
  );
}

/* ---------- Diapers ---------- */
function DiaperScreen({ items, onAdd, onDelete }) {
  const today = new Date().toISOString().slice(0, 10);
  const todayCount = items.filter((i) => i.date === today).length;
  const quickLog = (type) => onAdd({ id: uid(), date: today, time: new Date().toTimeString().slice(0, 5), type });
  const sorted = useMemo(() => [...items].sort((a, b) => `${b.date}${b.time}`.localeCompare(`${a.date}${a.time}`)), [items]);
  return (
    <div className="screen">
      <div className="screen-head"><h2>🚼 Diapers</h2><Badge tone="neutral">{todayCount} today</Badge></div>
      <div className="quick-actions three">
        <Btn variant="ghost" onClick={() => quickLog("Wet")}>💧 Wet</Btn>
        <Btn variant="ghost" onClick={() => quickLog("Dirty")}>💩 Dirty</Btn>
        <Btn variant="ghost" onClick={() => quickLog("Both")}>Both</Btn>
      </div>
      {sorted.length === 0 && <EmptyState text="No diapers logged yet." />}
      <div className="list">
        {sorted.map((item) => (
          <Card key={item.id}>
            <div className="row">
              <div className="grow">
                <div className="item-title">{item.type}</div>
                <div className="item-sub">{fmtDate(item.date)} · {fmtTime(item.time)}</div>
              </div>
              <IconBtn variant="danger" onClick={() => onDelete(item.id)}>✕</IconBtn>
            </div>
          </Card>
        ))}
      </div>
    </div>
  );
}

/* ---------- Today dashboard ---------- */
function TodayScreen({ data, setView }) {
  const { profile, nursing, diapers, journal, activeSleep } = data;
  const lastNursing = [...nursing].sort((a, b) => `${b.date}${b.time}`.localeCompare(`${a.date}${a.time}`))[0];
  const lastDiaper = [...diapers].sort((a, b) => `${b.date}${b.time}`.localeCompare(`${a.date}${a.time}`))[0];
  const lastJournal = [...journal].sort((a, b) => String(b.date || "").localeCompare(String(a.date || "")))[0];

  return (
    <div className="screen">
      <div className="today-hero">
        <Foot size={26} color="var(--marigold)" />
        <div>
          <h1>{profile.name || "Little Foot"}</h1>
          <p>{ageString(profile.dob) || "Add a birthdate in Profile"}</p>
        </div>
      </div>

      {activeSleep && (
        <div className="hint-banner sleeping" onClick={() => setView("sleep")}>
          😴 Currently asleep ({activeSleep.type}) — tap to wake up
        </div>
      )}

      <div className="stat-row">
        <Card onClick={() => setView("feed")}>
          <div className="stat-label">Last feeding</div>
          <div className="stat-value">{lastNursing ? `${fmtTime(lastNursing.time)}` : "—"}</div>
          <div className="stat-sub">{lastNursing ? lastNursing.side : "No sessions yet"}</div>
        </Card>
        <Card onClick={() => setView("diapers")}>
          <div className="stat-label">Last diaper</div>
          <div className="stat-value">{lastDiaper ? fmtTime(lastDiaper.time) : "—"}</div>
          <div className="stat-sub">{lastDiaper ? lastDiaper.type : "None logged"}</div>
        </Card>
      </div>

      <div className="screen-head" style={{ marginTop: 8 }}><h2>📓 Latest memory</h2></div>
      {lastJournal ? (
        <Card onClick={() => setView("journal")}>
          <div className="item-title">{lastJournal.author}</div>
          <div className="item-sub">{fmtDate(lastJournal.date)}</div>
          <div className="item-notes">{lastJournal.text}</div>
        </Card>
      ) : (
        <EmptyState text="No journal entries yet — add your first memory together." />
      )}
    </div>
  );
}

/* ---------- Bottom nav ---------- */
const NAV = [
  { key: "today", icon: "🏠", label: "Today" },
  { key: "feed", icon: "🍼", label: "Feed" },
  { key: "sleep", icon: "😴", label: "Sleep" },
  { key: "diapers", icon: "🚼", label: "Diapers" },
  { key: "more", icon: "☰", label: "More" },
];
const MORE_KEYS = new Set(MORE_ITEMS.map((m) => m.key));

function BottomNav({ view, setView }) {
  const activeTop = MORE_KEYS.has(view) ? "more" : view;
  return (
    <nav className="bottom-nav">
      {NAV.map((n) => (
        <button key={n.key} className={activeTop === n.key ? "nav-item active" : "nav-item"} onClick={() => setView(n.key)}>
          <span className="nav-icon">{n.icon}</span>
          <span className="nav-label">{n.label}</span>
        </button>
      ))}
    </nav>
  );
}

/* ---------- App ---------- */
function App() {
  const [data, setData] = useState(DEF);
  const [view, setView] = useState("today");
  const [syncing, setSyncing] = useState(false);
  const [lastSynced, setLastSynced] = useState(null);
  const saveTimer = useRef(null);

  async function load() {
    if (!sb) return;
    setSyncing(true);
    try {
      const { data: row } = await sb.from("baby_data").select("data").eq("id", 1).single();
      if (row?.data) setData(deepMerge(DEF, row.data));
      setLastSynced(new Date());
    } catch (e) {
      console.error("Load failed", e);
    }
    setSyncing(false);
  }

  async function persist(next) {
    if (!sb) return;
    try {
      await sb.from("baby_data").update({ data: next }).eq("id", 1);
      setLastSynced(new Date());
    } catch (e) {
      console.error("Save failed", e);
    }
  }

  useEffect(() => { load(); }, []);

  function update(patch) {
    setData((prev) => {
      const next = typeof patch === "function" ? patch(prev) : { ...prev, ...patch };
      clearTimeout(saveTimer.current);
      saveTimer.current = setTimeout(() => persist(next), 500);
      return next;
    });
  }

  const addTo = (key) => (item) => update((prev) => ({ ...prev, [key]: [...prev[key], item] }));
  const deleteFrom = (key) => (id) => update((prev) => ({ ...prev, [key]: prev[key].filter((x) => x.id !== id) }));

  const startSleep = (type) => update((prev) => ({ ...prev, activeSleep: { type, start: new Date().toTimeString().slice(0, 5) } }));
  const stopSleep = () => update((prev) => {
    const entry = { id: uid(), type: prev.activeSleep.type, date: new Date().toISOString().slice(0, 10), start: prev.activeSleep.start, end: new Date().toTimeString().slice(0, 5) };
    return { ...prev, activeSleep: null, sleep: [...prev.sleep, entry] };
  });

  const isMore = MORE_KEYS.has(view);

  return (
    <div className="app">
      <header className="app-header">
        <div className="brand"><Foot size={20} color="var(--marigold)" /><span>Little Foot</span></div>
        <button className="refresh-btn" onClick={load} disabled={syncing}>{syncing ? "…" : "↻"}</button>
      </header>

      {isMore && (
        <div className="back-row"><button className="back-btn" onClick={() => setView("more")}>← More</button></div>
      )}

      <main className="app-main">
        {view === "today" && <TodayScreen data={data} setView={setView} />}
        {view === "feed" && (
          <FeedingScreen
            nursing={data.nursing} solids={data.solids}
            onAddNursing={addTo("nursing")} onDeleteNursing={deleteFrom("nursing")}
            onAddSolid={addTo("solids")} onDeleteSolid={deleteFrom("solids")}
          />
        )}
        {view === "sleep" && (
          <SleepScreen items={data.sleep} active={data.activeSleep} onAdd={addTo("sleep")} onDelete={deleteFrom("sleep")} onStart={startSleep} onStop={stopSleep} />
        )}
        {view === "diapers" && <DiaperScreen items={data.diapers} onAdd={addTo("diapers")} onDelete={deleteFrom("diapers")} />}
        {view === "more" && <MoreScreen setView={setView} />}
        {view === "growth" && (
          <ListSection title="Growth" icon="📏" items={data.growth} fields={GROWTH_FIELDS}
            renderTitle={(i) => [i.weight && `${i.weight} lb`, i.height && `${i.height} in`, i.headCirc && `${i.headCirc} in hc`].filter(Boolean).join(" · ") || "Measurement"}
            onAdd={addTo("growth")} onDelete={deleteFrom("growth")} emptyText="No growth measurements yet." />
        )}
        {view === "health" && (
          <ListSection title="Health" icon="🩺" items={data.health} fields={HEALTH_FIELDS}
            renderTitle={(i) => `${i.type || "Visit"}${i.doctor ? ` with ${i.doctor}` : ""}`}
            onAdd={addTo("health")} onDelete={deleteFrom("health")} emptyText="No doctor visits logged yet." />
        )}
        {view === "milestones" && (
          <ListSection title="Milestones" icon="⭐" items={data.milestones} fields={MILESTONE_FIELDS}
            renderTitle={(i) => i.title} renderSub={(i) => `${i.category || ""} · ${fmtDate(i.date)}`}
            onAdd={addTo("milestones")} onDelete={deleteFrom("milestones")} emptyText="No milestones logged yet." />
        )}
        {view === "words" && (
          <ListSection title="First words" icon="💬" items={data.words} fields={WORDS_FIELDS}
            renderTitle={(i) => `"${i.word}"`} renderSub={(i) => fmtDate(i.date)}
            onAdd={addTo("words")} onDelete={deleteFrom("words")} emptyText="No words logged yet." />
        )}
        {view === "journal" && (
          <JournalScreen items={data.journal} profile={data.profile} onAdd={addTo("journal")} onDelete={deleteFrom("journal")} />
        )}
        {view === "symptoms" && (
          <ListSection title="Symptoms" icon="🤒" items={data.symptoms} fields={SYMPTOM_FIELDS}
            renderTitle={(i) => `${i.type || "Symptom"}${i.temp ? ` · ${i.temp}°F` : ""}`} renderSub={(i) => `${i.severity || ""} · ${fmtDate(i.date)}`}
            onAdd={addTo("symptoms")} onDelete={deleteFrom("symptoms")} emptyText="No symptoms logged yet." />
        )}
        {view === "vaccines" && (
          <ListSection title="Vaccines" icon="💉" items={data.vaccines} fields={VACCINE_FIELDS} sortKey="scheduled"
            renderTitle={(i) => i.name} renderSub={(i) => i.given ? `Given ${fmtDate(i.given)}` : i.scheduled ? `Scheduled ${fmtDate(i.scheduled)}` : ""}
            tone={(i) => (i.given ? "given" : "scheduled")}
            onAdd={addTo("vaccines")} onDelete={deleteFrom("vaccines")} emptyText="No vaccines logged yet." />
        )}
        {view === "profile" && <ProfileScreen profile={data.profile} onSave={(p) => update({ profile: p })} />}
      </main>

      <BottomNav view={view} setView={setView} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

</script>
</body>
</html>
