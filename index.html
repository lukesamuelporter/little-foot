        {status === "checking" && <div className="item-title">Checking Google Calendar connection…</div>}
        {status === "not_configured" && (
          <div>
            <div className="item-title">Google Calendar isn't set up yet</div>
            <p className="rule-note">One-time setup: visit <code>/api/google-auth-start</code> on this site, approve access, then follow the instructions shown to finish connecting.</p>
          </div>
        )}
        {status === "error" && <div className="item-title">Couldn't reach Google Calendar — check back shortly.</div>}
      </Card>

      <div className="week-nav">
        <IconBtn onClick={() => setWeekStart((d) => { const nd = new Date(d); nd.setDate(nd.getDate() - 7); return nd; })}>‹</IconBtn>
        <span>{weekStart.toLocaleDateString(undefined, { month: "short", day: "numeric" })} – {days[6].toLocaleDateString(undefined, { month: "short", day: "numeric" })}</span>
        <IconBtn onClick={() => setWeekStart((d) => { const nd = new Date(d); nd.setDate(nd.getDate() + 7); return nd; })}>›</IconBtn>
      </div>

      {days.map((d, i) => {
        const dateStr = localDateStr(d);
        const isToday = dateStr === todayStr();
        const dayEvents = eventsForDay(d);
        const dayItems = scheduleForDay(d.getDay());
        return (
          <div key={dateStr} className={isToday ? "cal-day today" : "cal-day"}>
            <div className="cal-day-label">{d.toLocaleDateString(undefined, { weekday: "short", month: "short", day: "numeric" })}</div>
            {dayItems.length === 0 && dayEvents.length === 0 && <div className="cal-empty">Nothing scheduled</div>}
            {dayItems.map((item) => (
              <div key={item.id} className="cal-item schedule" onClick={() => { setEditing(item); setShowForm(true); }}>
                <span>{typeEmoji(item.type)}</span>
                <span className="cal-item-label">{item.label || (item.type === "sleep" ? "Nap" : "Feeding")}</span>
                <span className="cal-item-time">{fmtTime(item.time)}{parseInt(item.durationMin) ? ` · ${durLabel(parseInt(item.durationMin))}` : ""}</span>
              </div>
            ))}
            {dayEvents.map((ev) => (
              <a key={ev.id} className="cal-item google" href={ev.htmlLink} target="_blank" rel="noreferrer">
                <span>🔗</span><span className="cal-item-label">{ev.summary || "(untitled)"}</span>
                <span className="cal-item-time">{ev.start?.dateTime ? fmtTime(ev.start.dateTime.slice(11, 16)) : "All day"}</span>
              </a>
            ))}
          </div>
        );
      })}

      {showForm && (
        <Sheet onClose={() => { setShowForm(false); setEditing(null); }}>
          <ScheduleForm
            initial={editing}
            onCancel={() => { setShowForm(false); setEditing(null); }}
            onSave={(item) => { if (editing && editing.id) onUpdateSchedule(item); else onAddSchedule(item); setShowForm(false); setEditing(null); }}
            onDelete={(id) => { onDeleteSchedule(id); setShowForm(false); setEditing(null); }}
            onSync={token ? handleSync : null}
          />
        </Sheet>
      )}
    </div>
  );
}

function Sparkline({ values, color }) {
  if (!values || values.length < 2) return null;
  const w = 52, h = 18;
  const min = Math.min(...values), max = Math.max(...values), range = max - min || 1;
  const pts = values.map((v, i) => `${(i / (values.length - 1) * w).toFixed(1)},${(h - ((v - min) / range) * h).toFixed(1)}`).join(" ");
  return (
    <svg className="metric-spark" width={w} height={h} viewBox={`0 0 ${w} ${h}`}>
      <polyline points={pts} fill="none" stroke={color} strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round" opacity="0.55" />
    </svg>
  );
}
function MetricCard({ label, value, unit, trend, spark, color, onClick }) {
  return (
    <div className="metric-card" onClick={onClick}>
      <div className="metric-label">{label}</div>
      <div className="metric-value">{value}{unit && <span className="unit">{unit}</span>}</div>
      {trend && <div className={`metric-trend ${trend.dir}`}>{trend.arrow} {trend.text}</div>}
      {spark && spark.length >= 2 && <Sparkline values={spark} color={color} />}
    </div>
  );
}

/* ---------- Up Next: routines, next feed estimate, nap window, and today's Google events ---------- */
function UpNextCard({ data, token, setView }) {
  const { profile, schedule } = data;
  const [googleToday, setGoogleToday] = useState([]);
  useEffect(() => {
    if (!token) { setGoogleToday([]); return; }
    const now = new Date();
    const end = new Date(); end.setHours(23, 59, 59, 999);
    fetchGoogleEvents(token, now.toISOString(), end.toISOString()).then(setGoogleToday).catch(() => setGoogleToday([]));
  }, [token]);

  const rows = [];
  const { lastFeedDt, lastWakeDt } = deriveStatus(data);
  const remindH = parseFloat(profile.reminderHours) || 3;

  if (lastFeedDt) {
    const due = new Date(lastFeedDt.getTime() + remindH * 3600000);
    rows.push({ dt: due, icon: "🍼", label: "Next feed (est.)", right: due.getTime() < Date.now() ? `overdue ${durLabel(Math.round((Date.now() - due.getTime()) / 60000))}` : `${fmtClock(due)} · ${inLabel(due)}`, tone: due.getTime() < Date.now() ? "overdue" : "", onClick: () => setView("log") });
  }
  if (!data.activeSleep && lastWakeDt && profile.dob) {
    const m = monthsBetween(profile.dob, todayStr());
    const w = wakeWindowMin(m);
    if (w) {
      const s = new Date(lastWakeDt.getTime() + w[0] * 60000);
      const e = new Date(lastWakeDt.getTime() + w[1] * 60000);
      const past = Date.now() > e.getTime();
      const open = !past && Date.now() >= s.getTime();
      rows.push({ dt: s, icon: "😴", label: `Nap window ${fmtClock(s)}–${fmtClock(e)}`, right: past ? "may be overtired" : open ? "open now" : inLabel(s), tone: past ? "overdue" : open ? "now" : "", onClick: () => setView("log") });
    }
  }
  upcomingSchedule(schedule, 3).forEach(({ dt, item }) => {
    rows.push({ dt, icon: typeEmoji(item.type), label: item.label || (item.type === "sleep" ? "Nap" : "Feeding"), right: `${fmtClock(dt)} · ${inLabel(dt)}`, tone: "", onClick: () => setView("calendar") });
  });
  googleToday.slice(0, 3).forEach((ev) => {
    const dt = ev.start?.dateTime ? new Date(ev.start.dateTime) : null;
    if (!dt) return;
    rows.push({ dt, icon: "🔗", label: ev.summary || "(untitled)", right: `${fmtClock(dt)} · ${inLabel(dt)}`, tone: "", href: ev.htmlLink });
  });
  rows.sort((a, b) => a.dt - b.dt);
  const shown = rows.slice(0, 5);

  return (
    <Card>
      <div className="log-card-head">
        <div className="item-title">⏱️ Up next</div>
        <button className="link-btn" onClick={() => setView("calendar")}>Calendar &amp; routines</button>
      </div>
      {shown.length === 0 && <div className="item-sub">Nothing coming up. Add bedtime, naptime, or mealtime routines to see them here with a countdown.</div>}
      {shown.map((r, i) => r.href ? (
        <a key={i} className="cal-item google" href={r.href} target="_blank" rel="noreferrer">
          <span>{r.icon}</span><span className="cal-item-label">{r.label}</span>
          <span className={`cal-item-time ${r.tone}`}>{r.right}</span>
        </a>
      ) : (
        <div key={i} className="cal-item" onClick={r.onClick}>
          <span>{r.icon}</span><span className="cal-item-label">{r.label}</span>
          <span className={`cal-item-time ${r.tone}`}>{r.right}</span>
        </div>
      ))}
    </Card>
  );
}

/* ---------- Today dashboard ---------- */
function TodayScreen({ data, token, setView }) {
  const { profile, nursing, diapers, journal, activeSleep, sleep } = data;
  const lastJournal = [...journal].sort((a, b) => String(b.date || "").localeCompare(String(a.date || "")))[0];

  const today = todayStr();
  const feedsToday = nursing.filter((n) => n.date === today);
  const diapersToday = diapers.filter((d) => d.date === today);
  const sleepToday = sleep.filter((s) => s.date === today);
  const sleepMinToday = sleepToday.reduce((s, e) => s + (minutesBetween(e.start, e.end) || 0), 0)
    + (activeSleep ? Math.round((Date.now() - new Date(activeSleep.startedAt).getTime()) / 60000) : 0);

  const expectedSleepMin = (parseFloat(profile.expectedSleepHours) || 14) * 60;
  const expectedDiapers = parseFloat(profile.expectedDiapers) || 6;
  const expectedFeeds = parseFloat(profile.expectedFeeds) || 8;

  const yd = localDateStr(new Date(Date.now() - 86400000));
  const ydFeeds = nursing.filter((n) => n.date === yd).length;
  const ydSleepMin = sleep.filter((s) => s.date === yd).reduce((s, e) => s + (minutesBetween(e.start, e.end) || 0), 0);
  const ydDiapers = diapers.filter((d) => d.date === yd);
  const ydWet = ydDiapers.filter((d) => d.type === "Wet" || d.type === "Both").length;
  const ydDirty = ydDiapers.filter((d) => d.type === "Dirty" || d.type === "Both").length;
  const hasYesterday = ydFeeds > 0 || ydSleepMin > 0 || ydDiapers.length > 0;

  // Per-day series for the last 7 days (oldest→newest), used for sparklines + trend-vs-average
  const days7 = Array.from({ length: 7 }, (_, i) => localDateStr(new Date(Date.now() - (6 - i) * 86400000)));
  const feedSeries = days7.map((ds) => nursing.filter((n) => n.date === ds).length);
  const sleepSeries = days7.map((ds) => sleep.filter((s) => s.date === ds).reduce((a, e) => a + (minutesBetween(e.start, e.end) || 0), 0) / 60);
  const diaperSeries = days7.map((ds) => diapers.filter((d) => d.date === ds).length);
  // Average of the prior 6 complete days (exclude today, which is still in progress)
  const avgOf = (series) => { const prior = series.slice(0, 6).filter((_, i) => days7[i] !== today); const nz = prior.length ? prior : series.slice(0, 6); return nz.reduce((a, b) => a + b, 0) / (nz.length || 1); };
  const feedAvg = avgOf(feedSeries), sleepAvg = avgOf(sleepSeries), diaperAvg = avgOf(diaperSeries);
  const sleepHrToday = sleepMinToday / 60;
  const trend = (now, avg, unitTail) => {
    if (!avg) return null;
    const diff = now - avg;
    const pct = Math.abs(diff / avg);
    if (pct < 0.12) return { dir: "flat", arrow: "→", text: `about avg${unitTail}` };
    return diff > 0 ? { dir: "up", arrow: "↑", text: `vs ${avg.toFixed(unitTail ? 1 : 0)}${unitTail} avg` } : { dir: "down", arrow: "↓", text: `vs ${avg.toFixed(unitTail ? 1 : 0)}${unitTail} avg` };
  };
  const { lastFeedDt } = deriveStatus(data);

  return (
    <div className="screen">
      <div className="today-hero">
        <Foot size={26} color="var(--marigold)" />
        <div>
          <h1>{profile.name || "Little Foot"}</h1>
          <p>{ageString(profile.dob) || "Add a birthdate in Profile"}</p>
        </div>
      </div>

      {activeSleep && (
        <div className="hint-banner sleeping" onClick={() => setView("log")}>
          😴 Currently asleep ({activeSleep.type}) — tap to wake up
        </div>
      )}

      <UpNextCard data={data} token={token} setView={setView} />

      <div className="stat-label" style={{ margin: "2px 2px 8px" }}>Today so far</div>
      <div className="metric-grid">
        <MetricCard label="🍼 Feeds" value={feedsToday.length} trend={trend(feedsToday.length, feedAvg, "")} spark={feedSeries} color="var(--moss)" onClick={() => setView("log")} />
        <MetricCard label="😴 Sleep" value={sleepHrToday.toFixed(1)} unit="h" trend={trend(sleepHrToday, sleepAvg, "h")} spark={sleepSeries} color="var(--sky)" onClick={() => setView("log")} />
        <MetricCard label="🚼 Diapers" value={diapersToday.length} trend={trend(diapersToday.length, diaperAvg, "")} spark={diaperSeries} color="var(--marigold)" onClick={() => setView("log")} />
        <MetricCard label="⏱️ Last feed" value={lastFeedDt ? agoLabel(lastFeedDt).replace(" ago", "") : "—"} trend={lastFeedDt ? { dir: "flat", arrow: "", text: `${data.nursing.slice().sort((a,b)=>`${b.date} ${b.time}`.localeCompare(`${a.date} ${a.time}`))[0]?.side || ""}` } : null} color="var(--plum)" onClick={() => setView("log")} />
      </div>

      {data.advisor && data.advisor.tips && data.advisor.tips.length > 0 && (
        <Card onClick={() => setView("ask")}>
          <div className="stat-label">💡 From this week's guide</div>
          <div className="item-title" style={{ marginTop: 5 }}>{data.advisor.tips[0].title}</div>
          <div className="item-sub">{data.advisor.tips[0].body}</div>
        </Card>
      )}

      {hasYesterday && (
        <Card onClick={() => setView("history")}>
          <div className="stat-label">Yesterday at a glance</div>
          <div className="item-sub" style={{ marginTop: 5 }}>
            {ydFeeds} feed{ydFeeds === 1 ? "" : "s"} · {durLabel(ydSleepMin) || "0m"} sleep · {ydWet}💧 {ydDirty}💩
          </div>
        </Card>
      )}

      <div className="screen-head" style={{ marginTop: 8 }}><h2>📓 Latest memory</h2></div>
      {lastJournal ? (
        <Card onClick={() => setView("journal")}>
          <div className="item-title">{lastJournal.author === "Other" && lastJournal.otherName ? lastJournal.otherName : lastJournal.author}</div>
          <div className="item-sub">{fmtDate(lastJournal.date)}</div>
          <div className="item-notes">{lastJournal.text}</div>
        </Card>
      ) : (
        <EmptyState text="No journal entries yet — add your first memory together." />
      )}
    </div>
  );
}

/* ---------- App ---------- */
const ATTRIBUTED_KEYS = new Set(["nursing", "sleep", "diapers", "solids"]);
function App() {
  const [data, setData] = useState(DEF);
  const [view, setView] = useState("today");
  const [syncing, setSyncing] = useState(false);
  const [toast, setToast] = useState(null); // { msg, undo }
  const saveTimer = useRef(null);
  const toastTimer = useRef(null);
  const googleAuth = useGoogleAuth();

  const [deviceParent, setDeviceParentState] = useState(() => localStorage.getItem("lf_device_parent") || "");
  const setDeviceParent = (v) => { setDeviceParentState(v); localStorage.setItem("lf_device_parent", v); };

  // Re-render every 30s so countdowns, "ago" labels, and auto quiet mode stay current
  const [, setMinTick] = useState(0);
  useEffect(() => {
    const t = setInterval(() => setMinTick((x) => x + 1), 30000);
    return () => clearInterval(t);
  }, []);

  function showToast(msg, undo) {
    clearTimeout(toastTimer.current);
    setToast({ msg, undo });
    toastTimer.current = setTimeout(() => setToast(null), 5000);
  }

  /* Once-a-day safety copy: localStorage snapshot (last 7 kept) + optional baby_backups table */
  function runBackup(payload) {
    const day = todayStr();
    try {
      if (localStorage.getItem("lf_backup_day") === day) return;
      localStorage.setItem("lf_backup_" + day, JSON.stringify(payload));
      localStorage.setItem("lf_backup_day", day);
      const keys = Object.keys(localStorage).filter((k) => k.startsWith("lf_backup_") && k !== "lf_backup_day").sort();
      keys.slice(0, Math.max(0, keys.length - 7)).forEach((k) => localStorage.removeItem(k));
    } catch (e) { /* storage full — skip silently */ }
    if (sb) sb.from("baby_backups").insert({ day, data: payload }).then(() => {}, () => {});
  }

  async function load() {
    if (!sb) return;
    setSyncing(true);
    try {
      const { data: row } = await sb.from("baby_data").select("data").eq("id", 1).single();
      if (row?.data) {
        const merged = deepMerge(DEF, row.data);
        setData(merged);
        runBackup(row.data);
        maybeAutoGuide(merged);
      }
    } catch (e) {
      console.error("Load failed", e);
    }
    setSyncing(false);
  }

  async function persist(next) {
    if (!sb) return;
    try {
      await sb.from("baby_data").update({ data: next }).eq("id", 1);
    } catch (e) {
      console.error("Save failed", e);
    }
  }

  useEffect(() => { load(); }, []);

  function update(patch) {
    setData((prev) => {
      const next = typeof patch === "function" ? patch(prev) : { ...prev, ...patch };
      clearTimeout(saveTimer.current);
      saveTimer.current = setTimeout(() => persist(next), 500);
      return next;
    });
  }

  const addTo = (key) => (item) => {
    const stamped = ATTRIBUTED_KEYS.has(key) && deviceParent && !item.by ? { ...item, by: deviceParent } : item;
    update((prev) => ({ ...prev, [key]: [...prev[key], stamped] }));
  };
  const updateIn = (key) => (item) => update((prev) => ({ ...prev, [key]: prev[key].map((x) => (x.id === item.id ? item : x)) }));
  const deleteFrom = (key) => (id) => update((prev) => ({ ...prev, [key]: prev[key].filter((x) => x.id !== id) }));
  const delC = (key) => withConfirm(deleteFrom(key)); // confirmed deletes for UI buttons (toast Undo stays instant)

  const guideRanRef = useRef(false);
  async function maybeAutoGuide(d) {
    if (guideRanRef.current) return;
    guideRanRef.current = true;
    const key = localStorage.getItem("lf_api_key");
    if (!key) return;
    const last = d.advisor && d.advisor.lastRun ? new Date(d.advisor.lastRun).getTime() : 0;
    if (Date.now() - last < 7 * 86400000) return;
    try {
      const tips = await generateGuideTips(key, d);
      update({ advisor: { lastRun: new Date().toISOString(), ageAtRun: ageString(d.profile.dob), tips } });
      if ("Notification" in window && Notification.permission === "granted" && tips[0]) {
        new Notification("Little Foot — this week's guide", { body: tips[0].title });
      }
    } catch (e) { /* quiet — the Guide screen has a manual Refresh */ }
  }

  const quickDiaper = (type) => {
    const item = { id: uid(), date: todayStr(), time: nowTime(), type };
    addTo("diapers")(item);
    showToast(`${DIAPER_EMOJI[type]} ${type} diaper logged`, () => deleteFrom("diapers")(item.id));
  };

  const startSleep = (type, minutesAgo = 0) => update((prev) => {
    const startedAt = new Date(Date.now() - minutesAgo * 60000);
    return { ...prev, activeSleep: { type, start: startedAt.toTimeString().slice(0, 5), startedAt: startedAt.toISOString() } };
  });
  const stopSleep = () => {
    const active = data.activeSleep;
    if (!active) return;
    const mins = Math.round((Date.now() - new Date(active.startedAt).getTime()) / 60000);
    const entry = { id: uid(), type: active.type, date: localDateStr(new Date(active.startedAt)), start: active.start, end: nowTime(), by: deviceParent || undefined };
    update((prev) => ({ ...prev, activeSleep: null, sleep: [...prev.sleep, entry] }));
    showToast(`😴 Sleep logged · ${durLabel(mins)}`, () => deleteFrom("sleep")(entry.id));
  };

  const startFeeding = (side) => update((prev) => ({ ...prev, activeFeeding: { side, start: nowTime(), startedAt: new Date().toISOString() } }));
  const stopFeeding = () => {
    const active = data.activeFeeding;
    if (!active) return;
    const durationMin = Math.max(1, Math.round((Date.now() - new Date(active.startedAt).getTime()) / 60000));
    const entry = { id: uid(), date: localDateStr(new Date(active.startedAt)), time: active.start, side: active.side, duration: durationMin, by: deviceParent || undefined };
    update((prev) => ({ ...prev, activeFeeding: null, nursing: [...prev.nursing, entry] }));
    showToast(`🍼 Feeding logged · ${durLabel(durationMin)} · ${active.side}`, () => deleteFrom("nursing")(entry.id));
  };

  function exportBackup() {
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = `little-foot-backup-${todayStr()}.json`; a.click();
    URL.revokeObjectURL(url);
  }
  function importBackup(parsed) {
    update(() => deepMerge(DEF, parsed));
    showToast("Backup restored");
  }

  // Quiet mode: auto-dims 8pm–7am; tap the header icon to override (auto → on → off)
  const [quietPref, setQuietPref] = useState(() => localStorage.getItem("lf_quiet_pref") || "auto");
  useEffect(() => { localStorage.setItem("lf_quiet_pref", quietPref); }, [quietPref]);
  const hourNow = new Date().getHours();
  const quiet = quietPref === "on" || (quietPref === "auto" && (hourNow >= 20 || hourNow < 7));
  const cycleQuiet = () => setQuietPref((q) => (q === "auto" ? "on" : q === "on" ? "off" : "auto"));
  const quietIcon = quietPref === "auto" ? "🌗" : quietPref === "on" ? "🌙" : "☀️";

  // In-app reminder: fires a browser notification if the app is open and no feeding has
  // been logged for longer than the profile's configured window. This is a same-device,
  // app-open substitute for true push notifications, which would require server infrastructure.
  const remindedRef = useRef(false);
  useEffect(() => {
    if (!("Notification" in window)) return;
    if (Notification.permission === "default") Notification.requestPermission();
    const t = setInterval(() => {
      const lastFeed = [...data.nursing].sort((a, b) => `${b.date} ${b.time}`.localeCompare(`${a.date} ${a.time}`))[0];
      if (!lastFeed) return;
      const last = new Date(`${lastFeed.date}T${lastFeed.time}`);
      const hoursSince = (Date.now() - last.getTime()) / 3600000;
      const threshold = parseFloat(data.profile.reminderHours) || 3;
      if (hoursSince >= threshold && !remindedRef.current && Notification.permission === "granted") {
        new Notification("Little Foot", { body: `It's been about ${hoursSince.toFixed(1)}h since the last feeding.` });
        remindedRef.current = true;
      }
      if (hoursSince < threshold) remindedRef.current = false;
    }, 60000);
    return () => clearInterval(t);
  }, [data.nursing, data.profile.reminderHours]);

  const isMore = MORE_KEYS.has(view);

  return (
    <div className={quiet ? "app quiet" : "app"}>
      <header className="app-header">
        <div className="brand"><Foot size={20} color="var(--marigold)" /><span>Little Foot</span></div>
        <div className="header-actions">
          <button className="refresh-btn" onClick={cycleQuiet} title={`Quiet mode: ${quietPref}`}>{quietIcon}</button>
          <button className="refresh-btn" onClick={load} disabled={syncing}>{syncing ? "…" : "↻"}</button>
        </div>
      </header>

      <StatusStrip data={data} setView={setView} />

      {isMore && (
        <div className="back-row"><button className="back-btn" onClick={() => setView("more")}>← More</button></div>
      )}

      <main className="app-main">
        {view === "today" && <TodayScreen data={data} token={googleAuth.token} setView={setView} />}
        {view === "log" && (
          <LogScreen
            data={data}
            onStartFeeding={startFeeding} onStopFeeding={stopFeeding}
            onAddNursing={addTo("nursing")} onAddSolid={addTo("solids")}
            onStartSleep={startSleep} onStopSleep={stopSleep} onAddSleep={addTo("sleep")}
            onQuickDiaper={quickDiaper} onAddDiaper={addTo("diapers")}
          />
        )}
        {view === "history" && <HistoryScreen data={data} updateIn={updateIn} deleteFrom={delC} />}
        {view === "calendar" && (
          <CalendarScreen schedule={data.schedule} googleAuth={googleAuth} onAddSchedule={addTo("schedule")} onUpdateSchedule={updateIn("schedule")} onDeleteSchedule={delC("schedule")} />
        )}
        {view === "more" && <MoreScreen setView={setView} />}
        {view === "growth" && (
          <GrowthScreen items={data.growth} data={data} profile={data.profile} onAdd={addTo("growth")} onDelete={delC("growth")} />
        )}
        {view === "health" && (
          <ListSection title="Health" icon="🩺" items={data.health} fields={HEALTH_FIELDS}
            renderTitle={(i) => `${i.type || "Visit"}${i.doctor ? ` with ${i.doctor}` : ""}`}
            extraAction={(i) => <IconBtn onClick={(e) => { e.stopPropagation(); downloadICS({ title: `Doctor visit${i.doctor ? ` with ${i.doctor}` : ""}`, date: i.date, notes: i.notes }); }}>📅</IconBtn>}
            onAdd={addTo("health")} onUpdate={updateIn("health")} onDelete={delC("health")} emptyText="No doctor visits logged yet." />
        )}
        {view === "milestones" && (
          <ListSection title="Milestones" icon="⭐" items={data.milestones} fields={MILESTONE_FIELDS}
            renderTitle={(i) => i.title} renderSub={(i) => `${i.category || ""} · ${fmtDate(i.date)}`}
            onAdd={addTo("milestones")} onUpdate={updateIn("milestones")} onDelete={delC("milestones")} emptyText="No milestones logged yet." />
        )}
        {view === "words" && (
          <ListSection title="First words" icon="💬" items={data.words} fields={WORDS_FIELDS}
            renderTitle={(i) => `"${i.word}"`} renderSub={(i) => fmtDate(i.date)}
            onAdd={addTo("words")} onUpdate={updateIn("words")} onDelete={delC("words")} emptyText="No words logged yet." />
        )}
        {view === "journal" && (
          <JournalScreen items={data.journal} profile={data.profile} onAdd={addTo("journal")} onDelete={delC("journal")} />
        )}
        {view === "symptoms" && (
          <ListSection title="Symptoms" icon="🤒" items={data.symptoms} fields={SYMPTOM_FIELDS}
            renderTitle={(i) => `${i.type || "Symptom"}${i.temp ? ` · ${i.temp}°F` : ""}`} renderSub={(i) => `${i.severity || ""} · ${fmtDate(i.date)}`}
            onAdd={addTo("symptoms")} onUpdate={updateIn("symptoms")} onDelete={delC("symptoms")} emptyText="No symptoms logged yet." />
        )}
        {view === "vaccines" && (
          <ListSection title="Vaccines" icon="💉" items={data.vaccines} fields={VACCINE_FIELDS} sortKey="scheduled"
            renderTitle={(i) => i.name} renderSub={(i) => i.given ? `Given ${fmtDate(i.given)}` : i.scheduled ? `Scheduled ${fmtDate(i.scheduled)}` : ""}
            tone={(i) => (i.given ? "given" : "scheduled")}
            extraAction={(i) => (!i.given && i.scheduled ? <IconBtn onClick={(e) => { e.stopPropagation(); downloadICS({ title: `${i.name} vaccine`, date: i.scheduled, notes: i.notes }); }}>📅</IconBtn> : null)}
            onAdd={addTo("vaccines")} onUpdate={updateIn("vaccines")} onDelete={delC("vaccines")} emptyText="No vaccines logged yet." />
        )}
        {view === "prebirth" && <PreBirthScreen data={data} update={update} />}
        {view === "ask" && <GuideScreen data={data} update={update} onAddLearning={addTo("learnings")} onDeleteLearning={delC("learnings")} />}
        {view === "profile" && (
          <ProfileScreen profile={data.profile} onSave={(p) => update({ profile: p })}
            deviceParent={deviceParent} setDeviceParent={setDeviceParent}
            onExport={exportBackup} onImport={importBackup} />
        )}
      </main>

      {toast && (
        <div className="toast">
          <span>{toast.msg}</span>
          {toast.undo && <button onClick={() => { toast.undo(); setToast(null); }}>Undo</button>}
        </div>
      )}

      <BottomNav view={view} setView={setView} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

</script>
</body>
</html>
