  const [h, m] = item.time.split(":").map(Number);
  const start = new Date(); start.setHours(h, m, 0, 0);
  const end = new Date(start.getTime() + (parseInt(item.durationMin) || 30) * 60000);
  const body = {
    summary: item.label || (item.type === "sleep" ? "Nap" : item.type === "feed" ? "Feeding" : "Little Foot"),
    description: item.notes || "",
    start: { dateTime: start.toISOString() },
    end: { dateTime: end.toISOString() },
    recurrence: [item.days?.length && item.days.length < 7 ? `RRULE:FREQ=WEEKLY;BYDAY=${item.days.map(rruleDay).join(",")}` : "RRULE:FREQ=DAILY"],
  };
  const res = await fetch("https://www.googleapis.com/calendar/v3/calendars/primary/events", {
    method: "POST",
    headers: { Authorization: `Bearer ${token}`, "Content-Type": "application/json" },
    body: JSON.stringify(body),
  });
  if (!res.ok) throw new Error("Failed to create Google Calendar event");
  return res.json();
}

/* ---------- Grouped timeline (today / past week / weeks / months, drill-down) ---------- */
function startOfWeek(d) {
  const dt = new Date(d); const day = dt.getDay();
  dt.setDate(dt.getDate() - day); dt.setHours(0, 0, 0, 0);
  return dt;
}
function groupByPeriod(items, dateField) {
  const now = new Date(); now.setHours(0, 0, 0, 0);
  const todayStr = now.toISOString().slice(0, 10);
  const groups = { today: [], recentDays: {}, weeks: {}, months: {} };
  items.forEach((item) => {
    const raw = item[dateField];
    if (!raw) { groups.today.push(item); return; }
    const d = new Date(raw + "T00:00:00");
    const diffDays = Math.floor((now - d) / 86400000);
    if (raw === todayStr) groups.today.push(item);
    else if (diffDays >= 1 && diffDays <= 7) (groups.recentDays[raw] = groups.recentDays[raw] || []).push(item);
    else if (diffDays > 7 && diffDays <= 56) {
      const wk = startOfWeek(d).toISOString().slice(0, 10);
      (groups.weeks[wk] = groups.weeks[wk] || []).push(item);
    } else {
      const mk = raw.slice(0, 7);
      (groups.months[mk] = groups.months[mk] || []).push(item);
    }
  });
  return groups;
}
function CollapsibleGroup({ label, summary, children }) {
  const [open, setOpen] = useState(false);
  return (
    <div className="group-block">
      <button className="group-header" onClick={() => setOpen((o) => !o)}>
        <span>{label}</span>
        <span className="group-summary">{summary} <span className="chev">{open ? "▲" : "▼"}</span></span>
      </button>
      {open && <div className="group-body">{children}</div>}
    </div>
  );
}
function GroupedTimeline({ items, dateField = "date", timeField = "time", renderEntry, summarize }) {
  const groups = useMemo(() => groupByPeriod(items, dateField), [items, dateField]);
  const dayKeys = Object.keys(groups.recentDays).sort((a, b) => b.localeCompare(a));
  const weekKeys = Object.keys(groups.weeks).sort((a, b) => b.localeCompare(a));
  const monthKeys = Object.keys(groups.months).sort((a, b) => b.localeCompare(a));
  const byTimeDesc = (arr) => [...arr].sort((a, b) => String(b[timeField] || "").localeCompare(String(a[timeField] || "")));
  const byDateDesc = (arr) => [...arr].sort((a, b) => String(b[dateField] || "").localeCompare(String(a[dateField] || "")));

  return (
    <div className="grouped-timeline">
      {groups.today.length > 0 && (
        <>
          <div className="group-label-plain">Today</div>
          {byTimeDesc(groups.today).map(renderEntry)}
        </>
      )}
      {dayKeys.map((key) => {
        const dayItems = byTimeDesc(groups.recentDays[key]);
        return <CollapsibleGroup key={key} label={fmtDate(key)} summary={summarize(dayItems)}>{dayItems.map(renderEntry)}</CollapsibleGroup>;
      })}
      {weekKeys.map((key) => {
        const weekItems = byDateDesc(groups.weeks[key]);
        const end = new Date(key); end.setDate(end.getDate() + 6);
        return <CollapsibleGroup key={key} label={`Week of ${fmtDate(key)} – ${fmtDate(end.toISOString().slice(0, 10))}`} summary={summarize(weekItems)}>{weekItems.map(renderEntry)}</CollapsibleGroup>;
      })}
      {monthKeys.map((key) => {
        const monthItems = byDateDesc(groups.months[key]);
        const label = new Date(key + "-01T00:00:00").toLocaleDateString(undefined, { month: "long", year: "numeric" });
        return <CollapsibleGroup key={key} label={label} summary={summarize(monthItems)}>{monthItems.map(renderEntry)}</CollapsibleGroup>;
      })}
      {groups.today.length === 0 && dayKeys.length === 0 && weekKeys.length === 0 && monthKeys.length === 0 && (
        <EmptyState text="Nothing logged yet." />
      )}
    </div>
  );
}

/* ---------- Growth (chart + WHO percentile estimate + printable doctor summary) ---------- */
function GrowthChart({ items, metric, color }) {
  const pts = [...items]
    .filter((i) => i[metric] !== undefined && i[metric] !== null && i[metric] !== "")
    .sort((a, b) => String(a.date || "").localeCompare(String(b.date || "")));
  if (pts.length < 2) return <p className="chart-empty">Add at least two measurements to see a trend line.</p>;
  const values = pts.map((p) => parseFloat(p[metric]));
  const min = Math.min(...values), max = Math.max(...values);
  const range = max - min || 1;
  const w = 300, h = 90, pad = 10;
  const coord = (i, v) => [pad + (i / (pts.length - 1)) * (w - 2 * pad), h - pad - ((v - min) / range) * (h - 2 * pad)];
  const points = pts.map((p, i) => coord(i, parseFloat(p[metric])).join(",")).join(" ");
  return (
    <svg viewBox={`0 0 ${w} ${h}`} width="100%" height={h} preserveAspectRatio="none">
      <polyline points={points} fill="none" stroke={color} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" />
      {pts.map((p, i) => { const [x, y] = coord(i, parseFloat(p[metric])); return <circle key={i} cx={x} cy={y} r="2.6" fill={color} />; })}
    </svg>
  );
}
function GrowthScreen({ items, profile, onAdd, onDelete }) {

  const hasWeight = items.some((i) => i.weight);

  const latestW = [...items].filter((i) => i.weight).sort((a, b) => String(b.date).localeCompare(String(a.date)))[0];
  const latestH = [...items].filter((i) => i.height).sort((a, b) => String(b.date).localeCompare(String(a.date)))[0];
  const wKg = latestW ? parseFloat(latestW.weight) * (profile.units === "metric" ? 1 : 0.453592) : null;
  const hCm = latestH ? parseFloat(latestH.height) * (profile.units === "metric" ? 1 : 2.54) : null;
  const wPct = latestW ? whoPercentile(wKg, monthsBetween(profile.dob, latestW.date), profile.sex, "weight") : null;
  const hPct = latestH ? whoPercentile(hCm, monthsBetween(profile.dob, latestH.date), profile.sex, "height") : null;

/* ---------- Journal (custom: author select + photo) ---------- */
function JournalScreen({ items, profile, onAdd, onDelete }) {
  const [showForm, setShowForm] = useState(false);
  const [vals, setVals] = useState({ date: "", author: "", otherName: "", text: "", photo: null });
  const sorted = useMemo(() => [...items].sort((a, b) => String(b.date || "").localeCompare(String(a.date || ""))), [items]);

  function handlePhoto(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      const img = new Image();
      img.onload = () => {
        const scale = Math.min(1, 700 / img.width);
        const canvas = document.createElement("canvas");
        canvas.width = img.width * scale;
        canvas.height = img.height * scale;
        const ctx = canvas.getContext("2d");
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        setVals((s) => ({ ...s, photo: canvas.toDataURL("image/jpeg", 0.7) }));
      };
      img.src = reader.result;
    };
    reader.readAsDataURL(file);
  }

  return (
    <div className="screen">
      <div className="screen-head">
        <h2>📓 Journal</h2>
        <Btn onClick={() => { setVals({ date: new Date().toISOString().slice(0, 10), author: "", otherName: "", text: "", photo: null }); setShowForm(true); }}>+ Add</Btn>
      </div>
      {sorted.length === 0 && <EmptyState text="No journal entries yet. Capture your first memory together." />}
      <div className="list">
        {sorted.map((item) => (
          <Card key={item.id}>
            <div className="row">
              <div className="grow">
                <div className="item-title">{item.author === "Other" && item.otherName ? item.otherName : (item.author || "—")}</div>
                <div className="item-sub">{fmtDate(item.date)}</div>
              </div>
              <IconBtn variant="danger" onClick={() => onDelete(item.id)}>✕</IconBtn>
            </div>
            {item.photo && <img src={item.photo} className="journal-photo" alt="" />}
            {item.text && <div className="item-notes">{item.text}</div>}
          </Card>
        ))}
      </div>
      {showForm && (
        <Sheet onClose={() => setShowForm(false)}>
          <div className="sheet-head"><h3>Add journal entry</h3><IconBtn onClick={() => setShowForm(false)}>✕</IconBtn></div>
          <div className="sheet-body">
            <label className="field"><span>Date</span><input type="date" value={vals.date} onChange={(e) => setVals((s) => ({ ...s, date: e.target.value }))} /></label>
            <label className="field">
              <span>Who's writing?</span>
              <select value={vals.author} onChange={(e) => setVals((s) => ({ ...s, author: e.target.value }))}>
                <option value="">Select…</option>
                <option value="Mom">Mom</option>
                <option value="Dad">Dad</option>
                <option value="Other">Other</option>
              </select>
            </label>
            {vals.author === "Other" && (
              <label className="field"><span>Name</span><input value={vals.otherName} onChange={(e) => setVals((s) => ({ ...s, otherName: e.target.value }))} /></label>
            )}
            <label className="field"><span>Entry</span><textarea rows={4} value={vals.text} onChange={(e) => setVals((s) => ({ ...s, text: e.target.value }))} /></label>
            <label className="field"><span>Photo (optional)</span><input type="file" accept="image/*" onChange={handlePhoto} /></label>
            {vals.photo && <img src={vals.photo} className="journal-photo" alt="" />}
          </div>
          <div className="sheet-actions">
            <Btn variant="ghost" onClick={() => setShowForm(false)}>Cancel</Btn>
            <Btn onClick={() => { if (!vals.text) return alert("Please write something first."); onAdd({ ...vals, id: uid() }); setShowForm(false); }}>Save</Btn>
          </div>
        </Sheet>
      )}
    </div>
  );
}

/* ---------- Pre-Birth: contraction tracker ---------- */
function ContractionScreen({ items, onAdd, onDelete }) {
  const [active, setActive] = useState(null);
  const [, setTick] = useState(0);
  useEffect(() => {
    if (!active) return;
    const t = setInterval(() => setTick((x) => x + 1), 1000);
    return () => clearInterval(t);
  }, [active]);

  const sorted = useMemo(() => [...items].sort((a, b) => String(b.start || "").localeCompare(String(a.start || ""))), [items]);

  function start() { setActive({ start: new Date().toISOString() }); }
  function stop() {
    const end = new Date().toISOString();
    const durationSec = Math.max(1, Math.round((new Date(end) - new Date(active.start)) / 1000));
    onAdd({ id: uid(), start: active.start, end, durationSec });
    setActive(null);
  }

  const recentHour = sorted.filter((c) => Date.now() - new Date(c.start).getTime() <= 60 * 60 * 1000);
  let ruleMessage = null;
  if (recentHour.length >= 4) {
    const gaps = [];
    for (let i = 0; i < recentHour.length - 1; i++) gaps.push((new Date(recentHour[i].start) - new Date(recentHour[i + 1].start)) / 60000);
    const avgGap = gaps.reduce((a, b) => a + b, 0) / gaps.length;
    const avgDur = recentHour.reduce((a, c) => a + (c.durationSec || 0), 0) / recentHour.length;
    if (avgGap <= 5 && avgDur >= 60) ruleMessage = "Contractions are about 5 minutes apart and lasting a minute or more — this matches the 5-1-1 rule. Consider calling your provider.";
  }

  return (
    <div className="screen">
      {ruleMessage && <div className="hint-banner urgent">⚠️ {ruleMessage}</div>}
      <Card>
        {active ? (
          <div className="row">
            <div className="grow">
              <div className="item-title">Timing… {durLabel(Math.round((Date.now() - new Date(active.start).getTime()) / 60000))}</div>
              <div className="item-sub">Started {new Date(active.start).toLocaleTimeString()}</div>
            </div>
            <Btn variant="danger" onClick={stop}>Stop</Btn>
          </div>
        ) : (
          <div className="row">
            <div className="grow"><div className="item-title">Not timing a contraction</div></div>
            <Btn onClick={start}>Start</Btn>
          </div>
        )}
      </Card>
      <p className="rule-note">The 5-1-1 rule: contractions 5 minutes apart, lasting 1 minute each, for at least an hour — a common sign it's time to head in. Always follow your provider's specific guidance.</p>
      {sorted.length === 0 && <EmptyState text="No contractions logged yet." />}
      <div className="list">
        {sorted.map((c, i) => {
          const gap = i < sorted.length - 1 ? Math.round((new Date(c.start) - new Date(sorted[i + 1].start)) / 60000) : null;
          return (
            <Card key={c.id}>
              <div className="row">
                <div className="grow">
                  <div className="item-title">{new Date(c.start).toLocaleTimeString()}{c.durationSec ? ` · ${c.durationSec}s` : ""}</div>
                  <div className="item-sub">{gap != null ? `${gap} min since previous` : "First logged"}</div>
                </div>
                <IconBtn variant="danger" onClick={() => onDelete(c.id)}>✕</IconBtn>
              </div>
            </Card>
          );
        })}
      </div>
    </div>
  );
}

/* ---------- Ask (bring-your-own-key AI chat) ---------- */
function AskScreen({ data, profile }) {
  const [apiKey, setApiKey] = useState(() => localStorage.getItem("lf_api_key") || "");
  const [messages, setMessages] = useState([]);
  const [input, setInput] = useState("");
  const [loading, setLoading] = useState(false);

  function saveKey(k) { setApiKey(k); localStorage.setItem("lf_api_key", k); }

  function buildContext() {
    const lastFeed = [...data.nursing].sort((a, b) => `${b.date}${b.time}`.localeCompare(`${a.date}${a.time}`))[0];
    const lastDiaper = [...data.diapers].sort((a, b) => `${b.date}${b.time}`.localeCompare(`${a.date}${a.time}`))[0];
    return `Baby: ${profile.name || "unnamed"}, age: ${ageString(profile.dob)}. Last feeding: ${lastFeed ? `${lastFeed.date} ${lastFeed.time}, side ${lastFeed.side}` : "none logged"}. Last diaper: ${lastDiaper ? `${lastDiaper.date} ${lastDiaper.time}, ${lastDiaper.type}` : "none logged"}. Currently sleeping: ${data.activeSleep ? "yes" : "no"}.`;
  }

  async function send(text) {
    if (!apiKey) { alert("Add your Anthropic API key above first."); return; }
    const next = [...messages, { role: "user", content: text }];
    setMessages(next); setInput(""); setLoading(true);
    try {
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "x-api-key": apiKey,
          "anthropic-version": "2023-06-01",
          "anthropic-dangerous-direct-browser-access": "true",
        },
        body: JSON.stringify({
          model: "claude-sonnet-4-6",
          max_tokens: 500,
          system: `You are a calm, practical assistant helping tired parents with a newborn. Context: ${buildContext()}`,
          messages: next,
        }),
      });
      const json = await res.json();
      const reply = (json.content || []).filter((b) => b.type === "text").map((b) => b.text).join("\n") || "Sorry, I couldn't get a response.";
      setMessages((m) => [...m, { role: "assistant", content: reply }]);
    } catch (e) {
      setMessages((m) => [...m, { role: "assistant", content: "Something went wrong reaching Claude. Check your API key and connection." }]);
    }
    setLoading(false);
  }

  return (
    <div className="screen">
      <div className="screen-head"><h2>🤖 Ask</h2></div>
      {!apiKey && (
        <Card>
          <p className="rule-note">Bring your own Anthropic API key (from console.anthropic.com) to use this. It's stored only in this browser — never synced through Supabase — but anyone using this device could view it, so consider a key with a small spend limit.</p>
          <label className="field"><span>Anthropic API key</span><input type="password" defaultValue={apiKey} onBlur={(e) => saveKey(e.target.value)} placeholder="sk-ant-..." /></label>
        </Card>
      )}
      <div className="chat-log">
        {messages.map((m, i) => <div key={i} className={m.role === "user" ? "chat-bubble user" : "chat-bubble assistant"}>{m.content}</div>)}
        {loading && <div className="chat-bubble assistant">…</div>}
      </div>
      <div className="quick-actions" style={{ marginBottom: 10 }}>
        <Btn variant="ghost" onClick={() => send("The baby is crying right now — any ideas why, given the recent stats?")}>⚡ Crying now</Btn>
      </div>
      <div className="row">
        <input className="grow" placeholder="Ask something…" value={input} onChange={(e) => setInput(e.target.value)} onKeyDown={(e) => e.key === "Enter" && input.trim() && send(input.trim())} />
        <Btn onClick={() => input.trim() && send(input.trim())} disabled={loading}>Send</Btn>
      </div>
    </div>
  );
}

/* ---------- Calendar / Schedule ---------- */
function ScheduleForm({ initial, onCancel, onSave, onDelete, onSync }) {
  const [vals, setVals] = useState(initial || { type: "sleep", label: "", time: "09:00", durationMin: 30, days: [], notes: "" });
  const set = (k, v) => setVals((s) => ({ ...s, [k]: v }));
  const toggleDay = (i) => setVals((s) => ({ ...s, days: s.days.includes(i) ? s.days.filter((d) => d !== i) : [...s.days, i].sort() }));
  return (
    <>
      <div className="sheet-head"><h3>{initial ? "Edit" : "Add"} schedule item</h3><IconBtn onClick={onCancel}>✕</IconBtn></div>
      <div className="sheet-body">
        <label className="field">
          <span>Type</span>
          <select value={vals.type} onChange={(e) => set("type", e.target.value)}>
            <option value="sleep">Sleep / Nap</option>
            <option value="feed">Feeding</option>
            <option value="other">Other</option>
          </select>
        </label>
        <label className="field"><span>Label</span><input value={vals.label} onChange={(e) => set("label", e.target.value)} placeholder="e.g. Morning nap" /></label>
        <label className="field"><span>Time</span><input type="time" value={vals.time} onChange={(e) => set("time", e.target.value)} /></label>
        <label className="field"><span>Expected duration (min)</span><input type="number" value={vals.durationMin} onChange={(e) => set("durationMin", e.target.value)} /></label>
        <label className="field">
          <span>Days</span>
          <div className="chip-row">
            {DAYS_SHORT.map((d, i) => <button key={i} className={vals.days.includes(i) ? "chip active" : "chip"} onClick={() => toggleDay(i)}>{d}</button>)}
          </div>
          <button className="link-btn" onClick={() => set("days", vals.days.length === 7 ? [] : [0, 1, 2, 3, 4, 5, 6])}>{vals.days.length === 7 ? "Clear" : "Every day"}</button>
        </label>
        <label className="field"><span>Notes</span><textarea rows={2} value={vals.notes} onChange={(e) => set("notes", e.target.value)} /></label>
      </div>
      <div className="sheet-actions">
        <Btn variant="ghost" onClick={onCancel}>Cancel</Btn>
        {initial && onDelete && <Btn variant="danger" onClick={() => onDelete(initial.id)}>Delete</Btn>}
        {onSync && <Btn variant="ghost" onClick={() => onSync({ ...vals, id: vals.id || uid() })}>📅 Sync</Btn>}
        <Btn onClick={() => { if (!vals.time) return alert("Set a time first."); onSave({ ...vals, id: vals.id || uid() }); }}>Save</Btn>
      </div>
    </>
  );
}
function CalendarScreen({ schedule, onAddSchedule, onUpdateSchedule, onDeleteSchedule }) {
  const { token, status } = useGoogleAuth();
  const [weekStart, setWeekStart] = useState(() => startOfWeek(new Date()));
  const [googleEvents, setGoogleEvents] = useState([]);
  const [showForm, setShowForm] = useState(false);
  const [editing, setEditing] = useState(null);

  useEffect(() => {
    if (!token) { setGoogleEvents([]); return; }
    const timeMin = new Date(weekStart);
    const timeMax = new Date(weekStart); timeMax.setDate(timeMax.getDate() + 7);
    fetchGoogleEvents(token, timeMin.toISOString(), timeMax.toISOString()).then(setGoogleEvents).catch(() => setGoogleEvents([]));
  }, [token, weekStart]);

  const days = Array.from({ length: 7 }, (_, i) => { const d = new Date(weekStart); d.setDate(d.getDate() + i); return d; });

  const eventsForDay = (d) => {
    const dateStr = d.toISOString().slice(0, 10);
    return googleEvents.filter((ev) => (ev.start?.dateTime || ev.start?.date || "").slice(0, 10) === dateStr);
  };
  const scheduleForDay = (dayIndex) =>
    [...schedule].filter((s) => !s.days || s.days.length === 0 || s.days.includes(dayIndex)).sort((a, b) => String(a.time).localeCompare(String(b.time)));

  async function handleSync(item) {
    if (!token) return;
    try {
      const ev = await pushScheduleToGoogle(token, item);
      onUpdateSchedule({ ...item, googleEventId: ev.id });
      alert("Synced to Google Calendar.");
    } catch (e) {
      alert("Couldn't sync — try reconnecting Google Calendar.");
    }
  }

  return (
    <div className="screen">
      <div className="screen-head"><h2>🗓️ Calendar</h2><Btn onClick={() => { setEditing(null); setShowForm(true); }}>+ Schedule</Btn></div>

      <Card>
        {status === "connected" && (
          <div className="row"><div className="grow"><div className="item-title">🟢 Google Calendar connected</div><div className="item-sub">Refreshes automatically — nothing to do.</div></div></div>
        )}
        {status === "checking" && <div className="item-title">Checking Google Calendar connection…</div>}
        {status === "not_configured" && (
          <div>
            <div className="item-title">Google Calendar isn't set up yet</div>
            <p className="rule-note">One-time setup: visit <code>/api/google-auth-start</code> on this site, approve access, then follow the instructions shown to finish connecting.</p>
          </div>
        )}
        {status === "error" && <div className="item-title">Couldn't reach Google Calendar — check back shortly.</div>}
      </Card>

      <div className="week-nav">
        <IconBtn onClick={() => setWeekStart((d) => { const nd = new Date(d); nd.setDate(nd.getDate() - 7); return nd; })}>‹</IconBtn>
        <span>{weekStart.toLocaleDateString(undefined, { month: "short", day: "numeric" })} – {days[6].toLocaleDateString(undefined, { month: "short", day: "numeric" })}</span>
        <IconBtn onClick={() => setWeekStart((d) => { const nd = new Date(d); nd.setDate(nd.getDate() + 7); return nd; })}>›</IconBtn>
      </div>

      {days.map((d, i) => {
        const dateStr = d.toISOString().slice(0, 10);
        const isToday = dateStr === new Date().toISOString().slice(0, 10);
        const dayEvents = eventsForDay(d);
        const dayItems = scheduleForDay(i);
        return (
          <div key={dateStr} className={isToday ? "cal-day today" : "cal-day"}>
            <div className="cal-day-label">{d.toLocaleDateString(undefined, { weekday: "short", month: "short", day: "numeric" })}</div>
            {dayItems.length === 0 && dayEvents.length === 0 && <div className="cal-empty">Nothing scheduled</div>}
            {dayItems.map((item) => (
              <div key={item.id} className="cal-item schedule" onClick={() => { setEditing(item); setShowForm(true); }}>
                <span>{item.type === "sleep" ? "😴" : item.type === "feed" ? "🍼" : "📌"}</span>
                <span className="cal-item-label">{item.label || (item.type === "sleep" ? "Nap" : "Feeding")}</span>
                <span className="cal-item-time">{fmtTime(item.time)}</span>
              </div>
            ))}
            {dayEvents.map((ev) => (
              <a key={ev.id} className="cal-item google" href={ev.htmlLink} target="_blank" rel="noreferrer">
                <span>🔗</span><span className="cal-item-label">{ev.summary || "(untitled)"}</span>
                <span className="cal-item-time">{ev.start?.dateTime ? fmtTime(ev.start.dateTime.slice(11, 16)) : "All day"}</span>
              </a>
            ))}
          </div>
        );
      })}

      {showForm && (
        <Sheet onClose={() => { setShowForm(false); setEditing(null); }}>
          <ScheduleForm
            initial={editing}
            onCancel={() => { setShowForm(false); setEditing(null); }}
            onSave={(item) => { if (editing) onUpdateSchedule(item); else onAddSchedule(item); setShowForm(false); setEditing(null); }}
            onDelete={(id) => { onDeleteSchedule(id); setShowForm(false); setEditing(null); }}
            onSync={token ? handleSync : null}
          />
        </Sheet>
      )}
    </div>
  );
}

function Ring({ radius, stroke, progress, color, trackColor }) {
  const circumference = 2 * Math.PI * radius;
  const offset = circumference * (1 - Math.min(1, Math.max(0, progress)));
  return (
    <>
      <circle r={radius} fill="none" stroke={trackColor} strokeWidth={stroke} />
      <circle r={radius} fill="none" stroke={color} strokeWidth={stroke} strokeDasharray={circumference} strokeDashoffset={offset} strokeLinecap="round" transform="rotate(-90)" />
    </>
  );
}
function ActivityRings({ sleepPct, diaperPct, feedPct }) {
  const size = 176, c = size / 2;
  return (
    <svg viewBox={`0 0 ${size} ${size}`} width={size} height={size}>
      <g transform={`translate(${c},${c})`}>
        <Ring radius={70} stroke={13} progress={sleepPct} color="#6E93A8" trackColor="#E4EAF0" />
        <Ring radius={52} stroke={13} progress={diaperPct} color="#DE9138" trackColor="#F5E7D3" />
        <Ring radius={34} stroke={13} progress={feedPct} color="#5F7A5A" trackColor="#E1E8DE" />
      </g>
    </svg>
  );
}

/* ---------- Today dashboard ---------- */
function TodayScreen({ data, setView, onQuickDiaper }) {
  const { profile, nursing, diapers, journal, activeSleep, sleep } = data;
  const lastNursing = [...nursing].sort((a, b) => `${b.date}${b.time}`.localeCompare(`${a.date}${a.time}`))[0];
  const lastDiaper = [...diapers].sort((a, b) => `${b.date}${b.time}`.localeCompare(`${a.date}${a.time}`))[0];
  const lastJournal = [...journal].sort((a, b) => String(b.date || "").localeCompare(String(a.date || "")))[0];

  const today = new Date().toISOString().slice(0, 10);
  const feedsToday = nursing.filter((n) => n.date === today);
  const diapersToday = diapers.filter((d) => d.date === today);
  const sleepToday = sleep.filter((s) => s.date === today);
  const sleepMinToday = sleepToday.reduce((s, e) => s + (minutesBetween(e.start, e.end) || 0), 0)
    + (activeSleep ? Math.round((Date.now() - new Date(activeSleep.startedAt).getTime()) / 60000) : 0);

  const expectedSleepMin = (parseFloat(profile.expectedSleepHours) || 14) * 60;
  const expectedDiapers = parseFloat(profile.expectedDiapers) || 6;
  const expectedFeeds = parseFloat(profile.expectedFeeds) || 8;

  return (
    <div className="screen">
      <div className="today-hero">
        <Foot size={26} color="var(--marigold)" />
        <div>
          <h1>{profile.name || "Little Foot"}</h1>
          <p>{ageString(profile.dob) || "Add a birthdate in Profile"}</p>
        </div>
      </div>

      {activeSleep && (
        <div className="hint-banner sleeping" onClick={() => setView("sleep")}>
          😴 Currently asleep ({activeSleep.type}) — tap to wake up
        </div>
      )}

      <Card>
        <div className="rings-row">
          <ActivityRings sleepPct={sleepMinToday / expectedSleepMin} diaperPct={diapersToday.length / expectedDiapers} feedPct={feedsToday.length / expectedFeeds} />
          <div className="rings-legend">
            <div><span className="dot" style={{ background: "#6E93A8" }} />Sleep · {durLabel(sleepMinToday) || "0m"} / {profile.expectedSleepHours || 14}h</div>
            <div><span className="dot" style={{ background: "#DE9138" }} />Diapers · {diapersToday.length} / {expectedDiapers}</div>
            <div><span className="dot" style={{ background: "#5F7A5A" }} />Feeds · {feedsToday.length} / {expectedFeeds}</div>
          </div>
        </div>
      </Card>

      <div className="quick-actions three" style={{ marginTop: 4 }}>
        <Btn variant="ghost" onClick={() => onQuickDiaper("Wet")}>💧 Wet</Btn>
        <Btn variant="ghost" onClick={() => onQuickDiaper("Dirty")}>💩 Dirty</Btn>
        <Btn variant="ghost" onClick={() => onQuickDiaper("Both")}>💧💩 Both</Btn>
      </div>

      <div className="stat-row">
        <Card onClick={() => setView("feed")}>
          <div className="stat-label">Last feeding</div>
          <div className="stat-value">{lastNursing ? `${fmtTime(lastNursing.time)}` : "—"}</div>
          <div className="stat-sub">{lastNursing ? lastNursing.side : "No sessions yet"}</div>
        </Card>
        <Card onClick={() => setView("diapers")}>
          <div className="stat-label">Last diaper</div>
          <div className="stat-value">{lastDiaper ? `${DIAPER_EMOJI[lastDiaper.type] || ""} ${fmtTime(lastDiaper.time)}` : "—"}</div>
          <div className="stat-sub">{lastDiaper ? lastDiaper.type : "None logged"}</div>
        </Card>
      </div>

      <div className="screen-head" style={{ marginTop: 8 }}><h2>📓 Latest memory</h2></div>
      {lastJournal ? (
        <Card onClick={() => setView("journal")}>
          <div className="item-title">{lastJournal.author === "Other" && lastJournal.otherName ? lastJournal.otherName : lastJournal.author}</div>
          <div className="item-sub">{fmtDate(lastJournal.date)}</div>
          <div className="item-notes">{lastJournal.text}</div>
        </Card>
      ) : (
        <EmptyState text="No journal entries yet — add your first memory together." />
      )}
    </div>
  );
}

/* ---------- Bottom nav ---------- */
const NAV = [
  { key: "today", icon: "🏠", label: "Today" },
  { key: "feed", icon: "🍼", label: "Feed" },
  { key: "sleep", icon: "😴", label: "Sleep" },
  { key: "calendar", icon: "🗓️", label: "Calendar" },
  { key: "more", icon: "☰", label: "More" },
];
const MORE_KEYS = new Set(MORE_ITEMS.map((m) => m.key));

function BottomNav({ view, setView }) {
  const activeTop = MORE_KEYS.has(view) ? "more" : view;
  return (
    <nav className="bottom-nav">
      {NAV.map((n) => (
        <button key={n.key} className={activeTop === n.key ? "nav-item active" : "nav-item"} onClick={() => setView(n.key)}>
          <span className="nav-icon">{n.icon}</span>
          <span className="nav-label">{n.label}</span>
        </button>
      ))}
    </nav>
  );
}

/* ---------- App ---------- */
function App() {
  const [data, setData] = useState(DEF);
  const [view, setView] = useState("today");
  const [syncing, setSyncing] = useState(false);
  const [lastSynced, setLastSynced] = useState(null);
  const saveTimer = useRef(null);

  async function load() {
    if (!sb) return;
    setSyncing(true);
    try {
      const { data: row } = await sb.from("baby_data").select("data").eq("id", 1).single();
      if (row?.data) setData(deepMerge(DEF, row.data));
      setLastSynced(new Date());
    } catch (e) {
      console.error("Load failed", e);
    }
    setSyncing(false);
  }

  async function persist(next) {
    if (!sb) return;
    try {
      await sb.from("baby_data").update({ data: next }).eq("id", 1);
      setLastSynced(new Date());
    } catch (e) {
      console.error("Save failed", e);
    }
  }

  useEffect(() => { load(); }, []);

  function update(patch) {
    setData((prev) => {
      const next = typeof patch === "function" ? patch(prev) : { ...prev, ...patch };
      clearTimeout(saveTimer.current);
      saveTimer.current = setTimeout(() => persist(next), 500);
      return next;
    });
  }

  const addTo = (key) => (item) => update((prev) => ({ ...prev, [key]: [...prev[key], item] }));
  const updateIn = (key) => (item) => update((prev) => ({ ...prev, [key]: prev[key].map((x) => (x.id === item.id ? item : x)) }));
  const deleteFrom = (key) => (id) => update((prev) => ({ ...prev, [key]: prev[key].filter((x) => x.id !== id) }));
  const quickDiaper = (type) => addTo("diapers")({ id: uid(), date: new Date().toISOString().slice(0, 10), time: new Date().toTimeString().slice(0, 5), type });

  const startSleep = (type, minutesAgo = 0) => update((prev) => {
    const startedAt = new Date(Date.now() - minutesAgo * 60000);
    return { ...prev, activeSleep: { type, start: startedAt.toTimeString().slice(0, 5), startedAt: startedAt.toISOString() } };
  });
  const stopSleep = () => update((prev) => {
    const entry = { id: uid(), type: prev.activeSleep.type, date: new Date(prev.activeSleep.startedAt).toISOString().slice(0, 10), start: prev.activeSleep.start, end: new Date().toTimeString().slice(0, 5) };
    return { ...prev, activeSleep: null, sleep: [...prev.sleep, entry] };
  });

  const startFeeding = (side) => update((prev) => ({ ...prev, activeFeeding: { side, start: new Date().toTimeString().slice(0, 5), startedAt: new Date().toISOString() } }));
  const stopFeeding = () => update((prev) => {
    const durationMin = Math.max(1, Math.round((Date.now() - new Date(prev.activeFeeding.startedAt).getTime()) / 60000));
    const entry = { id: uid(), date: new Date().toISOString().slice(0, 10), time: prev.activeFeeding.start, side: prev.activeFeeding.side, duration: durationMin };
    return { ...prev, activeFeeding: null, nursing: [...prev.nursing, entry] };
  });

  // Quiet mode (per-device display preference, not synced)
  const [quiet, setQuiet] = useState(() => localStorage.getItem("lf_quiet") === "1");
  useEffect(() => { localStorage.setItem("lf_quiet", quiet ? "1" : "0"); }, [quiet]);

  // In-app reminder: fires a browser notification if the app is open and no feeding has
  // been logged for longer than the profile's configured window. This is a same-device,
  // app-open substitute for true push notifications, which would require server infrastructure.
  const remindedRef = useRef(false);
  useEffect(() => {
    if (!("Notification" in window)) return;
    if (Notification.permission === "default") Notification.requestPermission();
    const t = setInterval(() => {
      const lastFeed = [...data.nursing].sort((a, b) => `${b.date}${b.time}`.localeCompare(`${a.date}${a.time}`))[0];
      if (!lastFeed) return;
      const last = new Date(`${lastFeed.date}T${lastFeed.time}`);
      const hoursSince = (Date.now() - last.getTime()) / 3600000;
      const threshold = parseFloat(data.profile.reminderHours) || 3;
      if (hoursSince >= threshold && !remindedRef.current && Notification.permission === "granted") {
        new Notification("Little Foot", { body: `It's been about ${hoursSince.toFixed(1)}h since the last feeding.` });
        remindedRef.current = true;
      }
      if (hoursSince < threshold) remindedRef.current = false;
    }, 60000);
    return () => clearInterval(t);
  }, [data.nursing, data.profile.reminderHours]);

  const isMore = MORE_KEYS.has(view);

  return (
    <div className={quiet ? "app quiet" : "app"}>
      <header className="app-header">
        <div className="brand"><Foot size={20} color="var(--marigold)" /><span>Little Foot</span></div>
        <div className="header-actions">
          <button className="refresh-btn" onClick={() => setQuiet((q) => !q)} title="Quiet mode">{quiet ? "🌙" : "☀️"}</button>
          <button className="refresh-btn" onClick={load} disabled={syncing}>{syncing ? "…" : "↻"}</button>
        </div>
      </header>

      {isMore && (
        <div className="back-row"><button className="back-btn" onClick={() => setView("more")}>← More</button></div>
      )}

      <main className="app-main">
        {view === "today" && <TodayScreen data={data} setView={setView} onQuickDiaper={quickDiaper} />}
        {view === "feed" && (
          <FeedingScreen
            nursing={data.nursing} solids={data.solids}
            activeFeeding={data.activeFeeding} onStartFeeding={startFeeding} onStopFeeding={stopFeeding}
            onAddNursing={addTo("nursing")} onUpdateNursing={updateIn("nursing")} onDeleteNursing={deleteFrom("nursing")}
            onAddSolid={addTo("solids")} onUpdateSolid={updateIn("solids")} onDeleteSolid={deleteFrom("solids")}
          />
        )}
        {view === "sleep" && (
          <SleepScreen items={data.sleep} active={data.activeSleep} onAdd={addTo("sleep")} onUpdate={updateIn("sleep")} onDelete={deleteFrom("sleep")} onStart={startSleep} onStop={stopSleep} />
        )}
        {view === "calendar" && (
          <CalendarScreen schedule={data.schedule} onAddSchedule={addTo("schedule")} onUpdateSchedule={updateIn("schedule")} onDeleteSchedule={deleteFrom("schedule")} />
        )}
        {view === "diapers" && <DiaperScreen items={data.diapers} onAdd={addTo("diapers")} onUpdate={updateIn("diapers")} onDelete={deleteFrom("diapers")} />}
        {view === "more" && <MoreScreen setView={setView} />}
        {view === "growth" && (
          <GrowthScreen items={data.growth} profile={data.profile} onAdd={addTo("growth")} onDelete={deleteFrom("growth")} />
        )}
        {view === "health" && (
          <ListSection title="Health" icon="🩺" items={data.health} fields={HEALTH_FIELDS}
            renderTitle={(i) => `${i.type || "Visit"}${i.doctor ? ` with ${i.doctor}` : ""}`}
            extraAction={(i) => <IconBtn onClick={() => downloadICS({ title: `Doctor visit${i.doctor ? ` with ${i.doctor}` : ""}`, date: i.date, notes: i.notes })}>📅</IconBtn>}
            onAdd={addTo("health")} onUpdate={updateIn("health")} onDelete={deleteFrom("health")} emptyText="No doctor visits logged yet." />
        )}
        {view === "milestones" && (
          <ListSection title="Milestones" icon="⭐" items={data.milestones} fields={MILESTONE_FIELDS}
            renderTitle={(i) => i.title} renderSub={(i) => `${i.category || ""} · ${fmtDate(i.date)}`}
            onAdd={addTo("milestones")} onUpdate={updateIn("milestones")} onDelete={deleteFrom("milestones")} emptyText="No milestones logged yet." />
        )}
        {view === "words" && (
          <ListSection title="First words" icon="💬" items={data.words} fields={WORDS_FIELDS}
            renderTitle={(i) => `"${i.word}"`} renderSub={(i) => fmtDate(i.date)}
            onAdd={addTo("words")} onUpdate={updateIn("words")} onDelete={deleteFrom("words")} emptyText="No words logged yet." />
        )}
        {view === "journal" && (
          <JournalScreen items={data.journal} profile={data.profile} onAdd={addTo("journal")} onDelete={deleteFrom("journal")} />
        )}
        {view === "symptoms" && (
          <ListSection title="Symptoms" icon="🤒" items={data.symptoms} fields={SYMPTOM_FIELDS}
            renderTitle={(i) => `${i.type || "Symptom"}${i.temp ? ` · ${i.temp}°F` : ""}`} renderSub={(i) => `${i.severity || ""} · ${fmtDate(i.date)}`}
            onAdd={addTo("symptoms")} onUpdate={updateIn("symptoms")} onDelete={deleteFrom("symptoms")} emptyText="No symptoms logged yet." />
        )}
        {view === "vaccines" && (
          <ListSection title="Vaccines" icon="💉" items={data.vaccines} fields={VACCINE_FIELDS} sortKey="scheduled"
            renderTitle={(i) => i.name} renderSub={(i) => i.given ? `Given ${fmtDate(i.given)}` : i.scheduled ? `Scheduled ${fmtDate(i.scheduled)}` : ""}
            tone={(i) => (i.given ? "given" : "scheduled")}
            extraAction={(i) => (!i.given && i.scheduled ? <IconBtn onClick={() => downloadICS({ title: `${i.name} vaccine`, date: i.scheduled, notes: i.notes })}>📅</IconBtn> : null)}
            onAdd={addTo("vaccines")} onUpdate={updateIn("vaccines")} onDelete={deleteFrom("vaccines")} emptyText="No vaccines logged yet." />
        )}
        {view === "prebirth" && <PreBirthScreen data={data} update={update} />}
        {view === "ask" && <AskScreen data={data} profile={data.profile} />}
        {view === "profile" && <ProfileScreen profile={data.profile} onSave={(p) => update({ profile: p })} />}
      </main>

      <BottomNav view={view} setView={setView} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

</script>
