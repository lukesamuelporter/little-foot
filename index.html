<style>
  :root{
    --cream:#FBF6EC; --paper:#FFFFFF; --ink:#2C2620; --ink-soft:#7A7167;
    --line:#ECE2D0; --line-dark:#D8CBB0;
    --marigold:#DE9138; --marigold-deep:#B96F1F;
    --moss:#5F7A5A; --plum:#8B7098; --rose:#C0584B; --sky:#6E93A8;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;background:var(--cream);}
  body{font-family:'Figtree',-apple-system,BlinkMacSystemFont,sans-serif;color:var(--ink);}
  input,select,textarea,button{font-family:inherit;}

  .app{max-width:480px;margin:0 auto;min-height:100vh;background:var(--cream);display:flex;flex-direction:column;padding-bottom:84px;}

  .app-header{display:flex;justify-content:space-between;align-items:center;padding:14px 18px;position:sticky;top:0;background:var(--cream);z-index:5;border-bottom:1px solid var(--line);}
  .brand{display:flex;gap:8px;align-items:center;font-family:'Fraunces',serif;font-weight:600;font-size:19px;}
  .refresh-btn{width:34px;height:34px;border-radius:50%;background:var(--paper);border:1px solid var(--line);font-size:16px;cursor:pointer;color:var(--ink);}

  .status-strip{display:flex;gap:7px;padding:9px 18px 10px;overflow-x:auto;-webkit-overflow-scrolling:touch;border-bottom:1px solid var(--line);}
  .status-chip{flex-shrink:0;display:flex;align-items:center;gap:6px;background:var(--paper);border:1px solid var(--line);border-radius:20px;padding:6px 11px;font-size:12px;font-weight:700;color:var(--ink);cursor:pointer;white-space:nowrap;}
  .status-chip .sc-sub{font-weight:600;color:var(--ink-soft);}
  .status-chip.good{background:#EDF3EB;border-color:#C9DAC4;}
  .status-chip.warn{background:#FBEAD3;border-color:#EAD1A6;}
  .status-chip.urgent{background:#F6DAD6;border-color:#E5B3AC;color:var(--rose);}
  .status-chip.urgent .sc-sub{color:var(--rose);}

  .back-row{padding:10px 18px 0;}
  .back-btn{background:none;border:none;color:var(--marigold-deep);font-weight:700;font-size:14px;cursor:pointer;padding:4px 0;}

  .app-main{flex:1;padding:14px 18px 24px;}
  .screen-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;gap:10px;}
  .screen-head h2{font-family:'Fraunces',serif;font-size:20px;font-weight:600;margin:0;}

  .today-hero{display:flex;align-items:center;gap:12px;margin-bottom:14px;}
  .today-hero h1{font-family:'Fraunces',serif;font-size:25px;margin:0;font-weight:600;}
  .today-hero p{margin:2px 0 0;color:var(--ink-soft);font-size:14px;}

  .stat-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
  .stat-label{font-size:11px;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.05em;font-weight:700;}
  .stat-value{font-family:'Fraunces',serif;font-size:20px;font-weight:600;margin-top:3px;}
  .stat-sub{font-size:13px;color:var(--ink-soft);margin-top:2px;}

  .card{background:var(--paper);border:1px solid var(--line);border-radius:14px;padding:13px 14px;margin-bottom:10px;}
  .row{display:flex;align-items:center;gap:10px;}
  .grow{flex:1;min-width:0;}
  .item-title{font-weight:700;font-size:15px;}
  .item-sub{font-size:13px;color:var(--ink-soft);margin-top:1px;}
  .item-notes{font-size:13px;color:var(--ink);margin-top:9px;border-top:1px solid var(--line);padding-top:9px;line-height:1.4;}

  .list{display:flex;flex-direction:column;}

  .btn{border:none;border-radius:10px;padding:9px 16px;font-weight:700;font-size:14px;cursor:pointer;white-space:nowrap;}
  .btn-primary{background:var(--marigold);color:#fff;}
  .btn-ghost{background:var(--paper);color:var(--ink);border:1px solid var(--line);}
  .btn-danger{background:var(--rose);color:#fff;}
  .btn-full{width:100%;margin-top:6px;}

  .icon-btn{width:30px;height:30px;border-radius:50%;border:none;background:var(--cream);cursor:pointer;font-size:14px;flex-shrink:0;color:var(--ink);}
  .icon-btn.danger{color:var(--rose);}

  .badge{font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;text-transform:capitalize;flex-shrink:0;}
  .badge-given{background:#E4EEE1;color:var(--moss);}
  .badge-scheduled{background:#FBEAD3;color:var(--marigold-deep);}
  .badge-neutral{background:var(--line);color:var(--ink-soft);}

  .empty{text-align:center;padding:36px 12px;color:var(--ink-soft);}
  .empty-icon{margin-bottom:10px;display:flex;justify-content:center;}
  .empty p{margin:0;font-size:14px;}

  .sheet-backdrop{position:fixed;inset:0;background:rgba(44,38,32,.42);display:flex;align-items:flex-end;z-index:20;}
  .sheet{background:var(--paper);width:100%;max-width:480px;margin:0 auto;border-radius:20px 20px 0 0;max-height:88vh;overflow-y:auto;padding:18px 18px calc(18px + env(safe-area-inset-bottom));}
  .sheet-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
  .sheet-head h3{font-family:'Fraunces',serif;font-size:18px;margin:0;font-weight:600;}
  .sheet-body{display:flex;flex-direction:column;gap:13px;}
  .sheet-actions{display:flex;gap:10px;margin-top:18px;}
  .sheet-actions .btn{flex:1;}

  .field{display:flex;flex-direction:column;gap:5px;font-size:13px;color:var(--ink-soft);font-weight:700;}
  .field input,.field select,.field textarea{font-size:15px;color:var(--ink);border:1px solid var(--line);border-radius:10px;padding:10px 11px;background:var(--cream);font-weight:400;width:100%;-webkit-appearance:none;appearance:none;}
  .field input:focus,.field select:focus,.field textarea:focus{outline:2px solid var(--marigold);border-color:transparent;}
  .field textarea{resize:vertical;}

  .subtabs{display:flex;gap:8px;margin-bottom:14px;}
  .subtab{border:1px solid var(--line);background:var(--paper);padding:7px 16px;border-radius:20px;font-size:13px;font-weight:700;color:var(--ink-soft);cursor:pointer;}
  .subtab.active{background:var(--marigold);border-color:var(--marigold);color:#fff;}

  .hint-banner{background:#FBEAD3;color:var(--marigold-deep);font-size:13px;font-weight:700;padding:11px 13px;border-radius:12px;margin-bottom:13px;display:flex;align-items:center;gap:6px;}
  .hint-banner.sleeping{background:#E4EAF0;color:var(--sky);cursor:pointer;}
  .hint-banner.urgent{background:#F6DAD6;color:var(--rose);}

  .quick-actions{display:flex;gap:8px;flex-shrink:0;}
  .quick-actions.three{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}

  .grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .grid-tile{background:var(--paper);border:1px solid var(--line);border-radius:14px;padding:20px 10px;display:flex;flex-direction:column;align-items:center;gap:7px;font-weight:700;font-size:13px;cursor:pointer;color:var(--ink);}
  .grid-icon{font-size:27px;}
  .more-group{margin-bottom:18px;}
  .more-group-title{font-size:12px;font-weight:700;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.05em;margin:0 0 8px;}

  .journal-photo{width:100%;border-radius:10px;margin-top:9px;display:block;}

  .bottom-nav{position:fixed;bottom:0;left:0;right:0;max-width:480px;margin:0 auto;background:var(--paper);border-top:1px solid var(--line);display:flex;padding-bottom:env(safe-area-inset-bottom);z-index:10;}
  .nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:10px 0 8px;border:none;background:none;color:var(--ink-soft);font-size:11px;font-weight:700;cursor:pointer;}
  .nav-item.active{color:var(--marigold-deep);}
  .nav-icon{font-size:19px;}

  .header-actions{display:flex;gap:8px;}
  .app.quiet{filter:brightness(0.55);}
  .app.quiet .bottom-nav,.app.quiet .app-header{background:#1a1712;}

  .screen-head-inline{display:flex;justify-content:flex-end;margin-bottom:10px;}
  .checkbox{width:20px;height:20px;flex-shrink:0;accent-color:var(--marigold);}
  .item-title.done{text-decoration:line-through;color:var(--ink-soft);}

  .pct-badge{font-size:11px;font-weight:700;color:var(--marigold-deep);background:#FBEAD3;padding:2px 8px;border-radius:20px;margin-left:8px;}
  .rule-note{font-size:12px;color:var(--ink-soft);line-height:1.4;margin:10px 0 0;}
  .chart-empty{font-size:12px;color:var(--ink-soft);margin:4px 0 0;}

  .summary-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  .summary-grid .stat-value{font-size:18px;}

  .chat-log{display:flex;flex-direction:column;gap:8px;margin-bottom:12px;max-height:50vh;overflow-y:auto;}
  .chat-bubble{padding:9px 13px;border-radius:14px;font-size:14px;max-width:85%;line-height:1.4;}
  .chat-bubble.user{align-self:flex-end;background:var(--marigold);color:#fff;}
  .chat-bubble.assistant{align-self:flex-start;background:var(--paper);border:1px solid var(--line);}

  .print-summary{display:none;}
  .print-summary h1{font-family:'Fraunces',serif;font-size:22px;margin:0 0 4px;}
  .print-summary h3{font-size:14px;margin:16px 0 4px;}
  .print-summary p{font-size:12px;color:#555;margin:0 0 10px;}
  .print-table{width:100%;border-collapse:collapse;margin-top:8px;font-size:11px;}
  .print-table th,.print-table td{border:1px solid #ccc;padding:5px 7px;text-align:left;}
  @media print{
    body *{visibility:hidden;}
    .print-summary,.print-summary *{visibility:visible;}
    .print-summary{display:block;position:absolute;top:0;left:0;width:100%;padding:20px;}
  }

  .diaper-emoji{font-size:22px;flex-shrink:0;}

  .field-group-label{font-size:12px;font-weight:700;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.04em;margin:6px 0 -4px;}

  .chip-row{display:flex;gap:7px;overflow-x:auto;padding-bottom:2px;-webkit-overflow-scrolling:touch;}
  .chip{flex-shrink:0;border:1px solid var(--line);background:var(--paper);padding:7px 13px;border-radius:20px;font-size:13px;font-weight:600;color:var(--ink);cursor:pointer;white-space:nowrap;}
  .chip.active{background:var(--marigold);border-color:var(--marigold);color:#fff;}
  .link-btn{border:none;background:none;color:var(--marigold-deep);font-weight:700;font-size:12px;cursor:pointer;padding:2px 0;text-align:left;}

  .group-block{margin-bottom:8px;}
  .group-header{width:100%;display:flex;justify-content:space-between;align-items:center;background:var(--paper);border:1px solid var(--line);border-radius:12px;padding:11px 13px;font-size:13px;font-weight:700;color:var(--ink);cursor:pointer;}
  .group-summary{color:var(--ink-soft);font-weight:600;font-size:12px;display:flex;align-items:center;gap:6px;}
  .chev{font-size:9px;}
  .group-body{padding-top:8px;}
  .group-label-plain{font-size:12px;font-weight:700;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.04em;margin:2px 0 6px;}

  .rings-row{display:flex;align-items:center;gap:16px;}
  .rings-legend{display:flex;flex-direction:column;gap:8px;font-size:13px;font-weight:600;}
  .rings-legend .dot{display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:7px;}

  .week-nav{display:flex;justify-content:space-between;align-items:center;margin:4px 0 12px;font-weight:700;font-size:14px;}
  .cal-day{margin-bottom:12px;}
  .cal-day.today .cal-day-label{color:var(--marigold-deep);}
  .cal-day-label{font-size:13px;font-weight:700;color:var(--ink-soft);margin-bottom:5px;text-transform:uppercase;letter-spacing:.03em;}
  .cal-empty{font-size:12px;color:var(--ink-soft);padding:6px 0;}
  .cal-item{display:flex;align-items:center;gap:8px;background:var(--paper);border:1px solid var(--line);border-radius:10px;padding:8px 11px;margin-bottom:6px;font-size:13px;cursor:pointer;text-decoration:none;color:var(--ink);}
  .cal-item.google{border-style:dashed;color:var(--ink-soft);}
  .cal-item-label{flex:1;font-weight:600;min-width:0;overflow:hidden;text-overflow:ellipsis;}
  .cal-item-time{font-size:12px;color:var(--ink-soft);flex-shrink:0;}
  .cal-item-time.overdue{color:var(--rose);font-weight:700;}
  .cal-item-time.now{color:var(--moss);font-weight:700;}

  .log-card-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:9px;}
  .log-card-head .item-title{font-family:'Fraunces',serif;font-size:16px;}
  .side-btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
  .side-btn{border:1px solid var(--line);background:var(--cream);border-radius:12px;padding:15px 10px;font-weight:700;font-size:15px;cursor:pointer;color:var(--ink);}

  .toast{position:fixed;bottom:96px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;border-radius:12px;padding:10px 15px;font-size:13px;font-weight:600;display:flex;gap:14px;align-items:center;z-index:30;box-shadow:0 4px 14px rgba(0,0,0,.25);white-space:nowrap;}
  .toast button{background:none;border:none;color:var(--marigold);font-weight:800;font-size:13px;cursor:pointer;padding:0;}

  .strip-legend{display:flex;gap:14px;font-size:11px;font-weight:600;color:var(--ink-soft);margin-top:6px;flex-wrap:wrap;}
  .strip-legend .dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:5px;}

  .side-btns.three{grid-template-columns:1fr 1fr 1fr;}

  .bar-row{margin-bottom:12px;}
  .bar-row:last-child{margin-bottom:2px;}
  .bar-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:5px;}
  .bar-label{font-weight:700;font-size:14px;}
  .bar-value{font-size:13px;color:var(--ink-soft);font-weight:600;}
  .bar-track{height:8px;border-radius:6px;background:var(--cream);border:1px solid var(--line);overflow:hidden;}
  .bar-fill{height:100%;border-radius:6px;}

  .metric-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
  .metric-card{background:var(--paper);border:1px solid var(--line);border-radius:14px;padding:12px 13px;cursor:pointer;position:relative;overflow:hidden;}
  .metric-label{font-size:12px;color:var(--ink-soft);font-weight:700;}
  .metric-value{font-family:'Fraunces',serif;font-size:26px;font-weight:600;margin-top:2px;line-height:1.05;}
  .metric-value .unit{font-size:15px;color:var(--ink-soft);font-weight:600;font-family:'Figtree',sans-serif;margin-left:2px;}
  .metric-trend{font-size:12px;font-weight:600;margin-top:3px;display:flex;align-items:center;gap:5px;}
  .metric-trend.up{color:var(--moss);}
  .metric-trend.down{color:var(--rose);}
  .metric-trend.flat{color:var(--ink-soft);}
  .metric-spark{position:absolute;right:9px;bottom:9px;opacity:.85;}

  .tip{padding:10px 0;border-top:1px solid var(--line);}
  .tip-title{font-weight:700;font-size:14px;}
  .tip-body{font-size:13px;color:var(--ink-soft);margin-top:3px;line-height:1.45;}
  .learn-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-top:1px solid var(--line);}
</style>
</head>

function deepMerge(def, loaded) {
  if (!loaded || typeof loaded !== "object") return def;
  const out = { ...def };
  for (const k of Object.keys(def)) {
    if (Array.isArray(def[k])) out[k] = Array.isArray(loaded[k]) ? loaded[k] : def[k];

const uid = () => (crypto.randomUUID ? crypto.randomUUID() : String(Date.now() + Math.random()));

/* Local-timezone date helpers (toISOString would roll to tomorrow's date during evening hours) */
function localDateStr(d) {
  const dt = d || new Date();
  return `${dt.getFullYear()}-${String(dt.getMonth() + 1).padStart(2, "0")}-${String(dt.getDate()).padStart(2, "0")}`;

function toMin(t) { if (!t) return 0; const [h, m] = t.split(":").map(Number); return h * 60 + m; }

function fmtDate(d) {
  if (!d) return "";
  const dt = new Date(d + (d.length <= 10 ? "T00:00:00" : ""));

  return dt.toLocaleDateString(undefined, { month: "short", day: "numeric", year: "numeric" });
}

  const [h, m] = t.split(":").map(Number);
  const ap = h >= 12 ? "PM" : "AM";
  const h12 = h % 12 === 0 ? 12 : h % 12;

function fmtClock(dt) {

}
function ageString(dob) {
  if (!dob) return "";
  const birth = new Date(dob + "T00:00:00");
  const now = new Date();
  let days = Math.floor((now - birth) / 86400000);
  if (days < 0) {
    const untilDays = Math.abs(days);

  if (days < 60) {
    const weeks = Math.floor(days / 7);

    return `${weeks}w ${rem}d old`;

  const months = Math.floor(days / 30.44);
  return `${months} month${months === 1 ? "" : "s"} old`;
}
function minutesBetween(start, end) {
  if (!start || !end) return null;
  let mins = toMin(end) - toMin(start);
  if (mins < 0) mins += 24 * 60;

}
function durLabel(mins) {
  if (mins == null) return "";

}
function agoLabel(dt) {

  if (hTot < 24) { const m = mTot % 60; return m ? `in ${hTot}h ${m}m` : `in ${hTot}h`; }
  const dTot = Math.floor(hTot / 24);
  if (dTot < 14) { const h = hTot % 24; return h ? `in ${dTot}d ${h}h` : `in ${dTot}d`; }
  const w = Math.floor(dTot / 7), d = dTot % 7;
  return d ? `in ${w}w ${d}d` : `in ${w}w`;
}

/* ---------- Shared status derivation (used by status strip + Today) ---------- */
function deriveStatus(data) {
  const byDT = (a, b) => `${b.date} ${b.time || ""}`.localeCompare(`${a.date} ${a.time || ""}`);
  const lastFeed = [...data.nursing].sort(byDT)[0] || null;
  const lastFeedDt = lastFeed ? dtFrom(lastFeed.date, lastFeed.time) : null;
  const lastDiaper = [...data.diapers].sort(byDT)[0] || null;
  const lastDiaperDt = lastDiaper ? dtFrom(lastDiaper.date, lastDiaper.time) : null;
  let lastWakeDt = null;
  data.sleep.forEach((s) => {
    if (!s.end || !s.date || !s.start) return;
    let e = dtFrom(s.date, s.end);
    if (toMin(s.end) < toMin(s.start)) e = new Date(e.getTime() + 86400000);
    if (!lastWakeDt || e > lastWakeDt) lastWakeDt = e;
  });
  return { lastFeed, lastFeedDt, lastDiaper, lastDiaperDt, lastWakeDt };
}

/* Care averages over the last N days — shared by the doctor report and the Guide */
function careStats(data, days) {
  const cutoff = new Date(); cutoff.setHours(0, 0, 0, 0); cutoff.setDate(cutoff.getDate() - (days - 1));
  const inRange = (d) => d && new Date(d + "T00:00:00") >= cutoff;
  const feeds = data.nursing.filter((n) => inRange(n.date));
  const nursingFeeds = feeds.filter((f) => f.side !== "Bottle");
  const bottleFeeds = feeds.filter((f) => f.side === "Bottle");
  const durations = nursingFeeds.map((f) => parseInt(f.duration)).filter((d) => !isNaN(d));
  const oz = bottleFeeds.map((f) => parseFloat(f.amount)).filter((x) => !isNaN(x));
  const sleeps = data.sleep.filter((s) => inRange(s.date));
  const sleepMins = sleeps.map((s) => minutesBetween(s.start, s.end)).filter((m) => m != null);
  const dias = data.diapers.filter((d) => inRange(d.date));
  const wet = dias.filter((d) => d.type === "Wet" || d.type === "Both").length;
  const dirty = dias.filter((d) => d.type === "Dirty" || d.type === "Both").length;
  return {
    days,
    feedsPerDay: feeds.length / days,
    nursingPerDay: nursingFeeds.length / days,
    bottlesPerDay: bottleFeeds.length / days,
    avgFeedMin: durations.length ? durations.reduce((a, b) => a + b, 0) / durations.length : null,
    avgBottleOz: oz.length ? oz.reduce((a, b) => a + b, 0) / oz.length : null,
    sleepMinPerDay: sleepMins.reduce((a, b) => a + b, 0) / days,
    longestSleepMin: sleepMins.length ? Math.max(...sleepMins) : null,
    wetPerDay: wet / days,
    dirtyPerDay: dirty / days,
  };
}

const WHO_WEIGHT_KG = {
  boy: { 0: 3.3, 1: 4.5, 2: 5.6, 3: 6.4, 4: 7.0, 5: 7.5, 6: 7.9, 9: 8.9, 12: 9.6, 15: 10.3, 18: 10.9, 21: 11.5, 24: 12.2 },
  girl: { 0: 3.2, 1: 4.2, 2: 5.1, 3: 5.8, 4: 6.4, 5: 6.9, 6: 7.3, 9: 8.2, 12: 8.9, 15: 9.6, 18: 10.2, 21: 10.9, 24: 11.5 },
};
const WHO_HEIGHT_CM = {
  boy: { 0: 49.9, 1: 54.7, 2: 58.4, 3: 61.4, 4: 63.9, 5: 65.9, 6: 67.6, 9: 72.0, 12: 75.7, 15: 79.1, 18: 82.3, 21: 85.1, 24: 87.8 },
  girl: { 0: 49.1, 1: 53.7, 2: 57.1, 3: 59.8, 4: 62.1, 5: 64.0, 6: 65.7, 9: 70.1, 12: 74.0, 15: 77.5, 18: 80.7, 21: 83.7, 24: 86.4 },
};
const KG_PER_LB = 0.453592, CM_PER_IN = 2.54;
function erf(x) {
  const sign = x < 0 ? -1 : 1; x = Math.abs(x);
  const a1 = 0.254829592, a2 = -0.284496736, a3 = 1.421413741, a4 = -1.453152027, a5 = 1.061405429, p = 0.3275911;
  const t = 1 / (1 + p * x);
  const y = 1 - (((((a5 * t + a4) * t) + a3) * t + a2) * t + a1) * t * Math.exp(-x * x);
  return sign * y;
}
function interpWHO(table, ageMonths) {
  const keys = Object.keys(table).map(Number).sort((a, b) => a - b);
  const clamped = Math.max(keys[0], Math.min(keys[keys.length - 1], ageMonths));
  for (let i = 0; i < keys.length - 1; i++) {
    if (clamped >= keys[i] && clamped <= keys[i + 1]) {
      const frac = (clamped - keys[i]) / (keys[i + 1] - keys[i]);
      return table[keys[i]] + frac * (table[keys[i + 1]] - table[keys[i]]);
    }
  }
  return table[keys[keys.length - 1]];
}
function whoPercentile(valueKgOrCm, ageMonths, sex, type) {
  if (!sex || ageMonths == null || valueKgOrCm == null || isNaN(valueKgOrCm)) return null;
  const table = (type === "weight" ? WHO_WEIGHT_KG : WHO_HEIGHT_CM)[sex];
  if (!table) return null;
  const median = interpWHO(table, ageMonths);
  const cv = type === "weight" ? 0.13 : 0.045;
  const sd = median * cv;
  const z = (valueKgOrCm - median) / sd;
  return Math.max(1, Math.min(99, Math.round(0.5 * (1 + erf(z / Math.SQRT2)) * 100)));
}
function monthsBetween(dob, dateStr) {
  if (!dob || !dateStr) return null;
  const a = new Date(dob + "T00:00:00"), b = new Date(dateStr + "T00:00:00");
  return (b - a) / (1000 * 60 * 60 * 24 * 30.44);
}
function downloadICS({ title, date, time, notes }) {
  const dt = new Date(`${date}T${time || "09:00"}:00`);
  const dtStr = dt.toISOString().replace(/[-:]/g, "").split(".")[0] + "Z";
  const ics = `BEGIN:VCALENDAR\nVERSION:2.0\nBEGIN:VEVENT\nDTSTART:${dtStr}\nSUMMARY:${title}\nDESCRIPTION:${notes || ""}\nEND:VEVENT\nEND:VCALENDAR`;
  const blob = new Blob([ics], { type: "text/calendar" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = `${title.replace(/\s+/g, "_")}.ics`; a.click();
  URL.revokeObjectURL(url);
}

/* ---------- Google Calendar (server-backed, silent refresh — see /api/google-*.js) ---------- */
function useGoogleAuth() {
  const [token, setToken] = useState(null);
  const [status, setStatus] = useState("checking"); // checking | connected | not_configured | error
  const expiryRef = useRef(0);

  async function refresh() {
    try {
      const res = await fetch("/api/google-token");
      const data = await res.json();
      if (data.access_token) {
        setToken(data.access_token);
        expiryRef.current = Date.now() + (data.expires_in ? (data.expires_in - 120) * 1000 : 3300 * 1000);
        setStatus("connected");
      } else if (data.error === "not_configured") {
        setStatus("not_configured");
      } else {
        setStatus("error");
      }
    } catch (e) {
      setStatus("error");
    }
  }

  useEffect(() => {
    refresh();
    const t = setInterval(() => { if (Date.now() > expiryRef.current - 60000) refresh(); }, 60000);
    return () => clearInterval(t);
  }, []);

  return { token, status };
}
async function fetchGoogleEvents(token, timeMin, timeMax) {
  const url = `https://www.googleapis.com/calendar/v3/calendars/primary/events?timeMin=${encodeURIComponent(timeMin)}&timeMax=${encodeURIComponent(timeMax)}&singleEvents=true&orderBy=startTime`;
  const res = await fetch(url, { headers: { Authorization: `Bearer ${token}` } });
  if (!res.ok) throw new Error("Google Calendar fetch failed");
  return (await res.json()).items || [];
}
function rruleDay(i) { return ["SU", "MO", "TU", "WE", "TH", "FR", "SA"][i]; }
async function pushScheduleToGoogle(token, item) {
  const [h, m] = item.time.split(":").map(Number);
  const start = new Date(); start.setHours(h, m, 0, 0);
  const end = new Date(start.getTime() + (parseInt(item.durationMin) || 30) * 60000);
  const body = {
    summary: item.label || (item.type === "sleep" ? "Nap" : item.type === "feed" ? "Feeding" : "Little Foot"),
    description: item.notes || "",
    start: { dateTime: start.toISOString() },
    end: { dateTime: end.toISOString() },
    recurrence: [item.days?.length && item.days.length < 7 ? `RRULE:FREQ=WEEKLY;BYDAY=${item.days.map(rruleDay).join(",")}` : "RRULE:FREQ=DAILY"],
  };
  const res = await fetch("https://www.googleapis.com/calendar/v3/calendars/primary/events", {
    method: "POST",
    headers: { Authorization: `Bearer ${token}`, "Content-Type": "application/json" },
    body: JSON.stringify(body),
  });
  if (!res.ok) throw new Error("Failed to create Google Calendar event");
  return res.json();
}
/* Next occurrences of routine/schedule items over the coming 48h */
function upcomingSchedule(schedule, count = 3) {
  const now = new Date();
  const out = [];
  for (let off = 0; off < 2; off++) {
    const d = new Date(now); d.setDate(d.getDate() + off);
    const dow = d.getDay();
    const ds = localDateStr(d);
    schedule.forEach((item) => {
      if (!item.time) return;
      if (item.days && item.days.length > 0 && !item.days.includes(dow)) return;
      const dt = dtFrom(ds, item.time);
      if (dt > now) out.push({ dt, item });
    });
  }
  out.sort((a, b) => a.dt - b.dt);
  return out.slice(0, count);
}

/* ---------- Grouped timeline (today / past week / weeks / months, drill-down) ---------- */
function startOfWeek(d) {
  const dt = new Date(d); const day = dt.getDay();
  dt.setDate(dt.getDate() - day); dt.setHours(0, 0, 0, 0);
  return dt;
}
function groupByPeriod(items, dateField) {
  const now = new Date(); now.setHours(0, 0, 0, 0);
  const today = todayStr();
  const groups = { today: [], recentDays: {}, weeks: {}, months: {} };
  items.forEach((item) => {
    const raw = item[dateField];
    if (!raw) { groups.today.push(item); return; }
    const d = new Date(raw + "T00:00:00");
    const diffDays = Math.floor((now - d) / 86400000);
    if (raw === today) groups.today.push(item);
    else if (diffDays >= 1 && diffDays <= 7) (groups.recentDays[raw] = groups.recentDays[raw] || []).push(item);
    else if (diffDays > 7 && diffDays <= 56) {
      const wk = localDateStr(startOfWeek(d));
      (groups.weeks[wk] = groups.weeks[wk] || []).push(item);
    } else {
      const mk = raw.slice(0, 7);
      (groups.months[mk] = groups.months[mk] || []).push(item);
    }
  });
  return groups;
}
function CollapsibleGroup({ label, summary, children }) {
  const [open, setOpen] = useState(false);
  return (
    <div className="group-block">
      <button className="group-header" onClick={() => setOpen((o) => !o)}>
        <span>{label}</span>
        <span className="group-summary">{summary} <span className="chev">{open ? "▲" : "▼"}</span></span>
      </button>
      {open && <div className="group-body">{children}</div>}
    </div>

function GroupedTimeline({ items, dateField = "date", timeField = "time", renderEntry, summarize }) {
  const groups = useMemo(() => groupByPeriod(items, dateField), [items, dateField]);
  const dayKeys = Object.keys(groups.recentDays).sort((a, b) => b.localeCompare(a));
  const weekKeys = Object.keys(groups.weeks).sort((a, b) => b.localeCompare(a));
  const monthKeys = Object.keys(groups.months).sort((a, b) => b.localeCompare(a));
  const byTimeDesc = (arr) => [...arr].sort((a, b) => String(b[timeField] || "").localeCompare(String(a[timeField] || "")));
  const byDateDesc = (arr) => [...arr].sort((a, b) => `${b[dateField] || ""} ${b[timeField] || ""}`.localeCompare(`${a[dateField] || ""} ${a[timeField] || ""}`));

  return (
    <div className="grouped-timeline">
      {groups.today.length > 0 && (
        <>
          <div className="group-label-plain">Today</div>
          {byTimeDesc(groups.today).map(renderEntry)}
        </>
      )}
      {dayKeys.map((key) => {
        const dayItems = byTimeDesc(groups.recentDays[key]);
        return <CollapsibleGroup key={key} label={fmtDate(key)} summary={summarize(dayItems)}>{dayItems.map(renderEntry)}</CollapsibleGroup>;
      })}
      {weekKeys.map((key) => {
        const weekItems = byDateDesc(groups.weeks[key]);
        const end = new Date(key + "T00:00:00"); end.setDate(end.getDate() + 6);
        return <CollapsibleGroup key={key} label={`Week of ${fmtDate(key)} – ${fmtDate(localDateStr(end))}`} summary={summarize(weekItems)}>{weekItems.map(renderEntry)}</CollapsibleGroup>;
      })}
      {monthKeys.map((key) => {
        const monthItems = byDateDesc(groups.months[key]);
        const label = new Date(key + "-01T00:00:00").toLocaleDateString(undefined, { month: "long", year: "numeric" });
        return <CollapsibleGroup key={key} label={label} summary={summarize(monthItems)}>{monthItems.map(renderEntry)}</CollapsibleGroup>;
      })}
      {groups.today.length === 0 && dayKeys.length === 0 && weekKeys.length === 0 && monthKeys.length === 0 && (
        <EmptyState text="Nothing logged yet." />
      )}
    </div>
  );
}

/* ---------- Status strip (persistent, answers the 3am questions on every screen) ---------- */
function StatusStrip({ data, setView }) {
  const { lastFeed, lastFeedDt, lastDiaper, lastDiaperDt, lastWakeDt } = deriveStatus(data);
  const remindMs = (parseFloat(data.profile.reminderHours) || 3) * 3600000;

  let feedTone = "good";
  if (lastFeedDt) {
    const r = (Date.now() - lastFeedDt.getTime()) / remindMs;

  }
  const active = data.activeSleep;

  return (

      <button className={`status-chip ${feedTone}`} onClick={() => setView("log")}>

/* ---------- 7-day pattern strip: sleep blocks, feed dots, diaper ticks on a 24h track ---------- */
function PatternStrip({ sleep, nursing, diapers, activeSleep }) {
  const days = Array.from({ length: 7 }, (_, i) => {
    const d = new Date(); d.setDate(d.getDate() - i);
    return localDateStr(d);
  });
  const daySet = new Set(days);

  // Split sleep sessions that cross midnight into per-day segments (minutes 0–1440)
  const segs = {};
  const pushSeg = (date, s, e) => { if (daySet.has(date) && e > s) (segs[date] = segs[date] || []).push([s, e]); };
  sleep.forEach((en) => {
    if (!en.date || !en.start || !en.end) return;
    const s = toMin(en.start), e = toMin(en.end);
    if (e >= s) pushSeg(en.date, s, e);
    else {
      pushSeg(en.date, s, 1440);
      const nd = new Date(en.date + "T00:00:00"); nd.setDate(nd.getDate() + 1);
      pushSeg(localDateStr(nd), 0, e);
    }
  });
  if (activeSleep) {
    const startDt = new Date(activeSleep.startedAt);
    let cur = new Date(startDt);
    const now = new Date();
    while (cur <= now) {
      const ds = localDateStr(cur);
      const dayStart = new Date(ds + "T00:00:00");
      const s = Math.max(0, Math.round((Math.max(startDt, dayStart) - dayStart) / 60000));
      const dayEnd = new Date(dayStart.getTime() + 86400000);
      const e = Math.min(1440, Math.round((Math.min(now, dayEnd) - dayStart) / 60000));
      pushSeg(ds, s, e);
      cur = dayEnd;
    }
  }

  const labelW = 46, trackW = 300, rowH = 24, trackH = 11;
  const h = days.length * rowH + 16;
  const X = (min) => labelW + (min / 1440) * trackW;
  const dayLabel = (ds, i) => (i === 0 ? "Today" : new Date(ds + "T00:00:00").toLocaleDateString(undefined, { weekday: "short" }));

  return (
    <Card>
      <div className="stat-label" style={{ marginBottom: 6 }}>Last 7 days · patterns</div>
      <svg viewBox={`0 0 ${labelW + trackW + 6} ${h}`} width="100%" style={{ display: "block" }}>
        {days.map((ds, i) => {
          const y = i * rowH + 4;
          const mid = y + trackH / 2;
          return (
            <g key={ds}>
              <text x={0} y={mid + 4} fontSize="10" fontWeight="700" fill="var(--ink-soft)">{dayLabel(ds, i)}</text>
              <rect x={labelW} y={y} width={trackW} height={trackH} rx={5} fill="var(--cream)" stroke="var(--line)" strokeWidth="0.6" />
              {(segs[ds] || []).map(([s, e], j) => (
                <rect key={j} x={X(s)} y={y} width={Math.max(2, X(e) - X(s))} height={trackH} rx={5} fill="var(--sky)" opacity="0.85" />
              ))}
              {diapers.filter((d) => d.date === ds && d.time).map((d, j) => (
                <rect key={"d" + j} x={X(toMin(d.time)) - 1} y={y - 2} width={2} height={trackH + 4} fill="var(--marigold)" />
              ))}
              {nursing.filter((n) => n.date === ds && n.time).map((n, j) => (
                <circle key={"f" + j} cx={X(toMin(n.time))} cy={mid} r={3} fill="var(--moss)" />
              ))}
            </g>
          );
        })}
        {[0, 360, 720, 1080, 1440].map((m, i) => (
          <text key={m} x={X(m)} y={h - 2} fontSize="9" fill="var(--ink-soft)" textAnchor={i === 0 ? "start" : i === 4 ? "end" : "middle"}>
            {["12a", "6a", "12p", "6p", "12a"][i]}
          </text>
        ))}
      </svg>
      <div className="strip-legend">
        <span><span className="dot" style={{ background: "var(--sky)" }} />Sleep</span>
        <span><span className="dot" style={{ background: "var(--moss)" }} />Feed</span>
        <span><span className="dot" style={{ background: "var(--marigold)" }} />Diaper</span>
      </div>
    </Card>
  );
}

/* ---------- History: one merged timeline of feeds, sleep, diapers, and solids ---------- */
const HISTORY_KINDS = {
  feed: { key: "nursing", fields: NURSING_FIELDS, label: "feeding" },
  solid: { key: "solids", fields: SOLIDS_FIELDS, label: "solid food" },
  sleep: { key: "sleep", fields: SLEEP_FIELDS, label: "sleep" },
  diaper: { key: "diapers", fields: DIAPER_FIELDS, label: "diaper" },
};
function HistoryScreen({ data, updateIn, deleteFrom }) {
  const [filter, setFilter] = useState("all");
  const [editing, setEditing] = useState(null); // {kind, item}

  const merged = useMemo(() => {
    const arr = [];
    data.nursing.forEach((i) => arr.push({ kind: "feed", wid: "f" + i.id, date: i.date, time: i.time || "", item: i }));
    data.solids.forEach((i) => arr.push({ kind: "solid", wid: "o" + i.id, date: i.date, time: "", item: i }));
    data.sleep.forEach((i) => arr.push({ kind: "sleep", wid: "s" + i.id, date: i.date, time: i.start || "", item: i }));
    data.diapers.forEach((i) => arr.push({ kind: "diaper", wid: "d" + i.id, date: i.date, time: i.time || "", item: i }));
    return filter === "all" ? arr : arr.filter((e) => e.kind === filter);
  }, [data.nursing, data.solids, data.sleep, data.diapers, filter]);

  const entryTitle = (e) => {
    const i = e.item;
    if (e.kind === "feed") return i.side === "Bottle"
      ? `🍼 Bottle${i.amount ? ` · ${i.amount} oz` : ""}${i.duration ? ` · ${i.duration}m` : ""}`
      : `🍼 ${i.side || "Feeding"}${i.duration ? ` · ${i.duration}m` : ""}`;
    if (e.kind === "solid") return `🥣 ${i.food || "Solid food"}${i.reaction && i.reaction !== "None" ? ` — ${i.reaction}` : ""}`;
    if (e.kind === "sleep") return `${i.type === "Night" ? "🌙" : "😴"} ${i.type || "Sleep"} · ${fmtTime(i.start)}${i.end ? ` – ${fmtTime(i.end)}` : ""}`;
    return `${DIAPER_EMOJI[i.type] || "🚼"} ${i.type || "Diaper"}`;
  };
  const entrySub = (e) => {
    const i = e.item;
    const bits = [];
    if (e.kind === "sleep") {
      const mins = minutesBetween(i.start, i.end);
      if (mins != null) bits.push(durLabel(mins));
    } else if (i.time) bits.push(fmtTime(i.time));
    if (i.by) bits.push(i.by);
    return bits.join(" · ") || fmtDate(i.date);
  };

  const renderEntry = (e) => (
    <Card key={e.wid} onClick={() => setEditing(e)}>
      <div className="row">
        <div className="grow">
          <div className="item-title">{entryTitle(e)}</div>
          <div className="item-sub">{entrySub(e)}</div>
        </div>
        <IconBtn variant="danger" onClick={(ev) => { ev.stopPropagation(); deleteFrom(HISTORY_KINDS[e.kind].key)(e.item.id); }}>✕</IconBtn>
      </div>
      {e.item.notes && <div className="item-notes">{e.item.notes}</div>}
    </Card>
  );
  const summarize = (arr) => {
    const c = { feed: 0, solid: 0, sleep: 0, diaper: 0 };
    arr.forEach((e) => c[e.kind]++);
    return [c.feed + c.solid ? `${c.feed + c.solid}🍼` : "", c.sleep ? `${c.sleep}😴` : "", c.diaper ? `${c.diaper}🚼` : ""].filter(Boolean).join(" ") || `${arr.length}`;
  };

  return (
    <div className="screen">
      <div className="screen-head"><h2>🕐 History</h2></div>
      <PatternStrip sleep={data.sleep} nursing={data.nursing} diapers={data.diapers} activeSleep={data.activeSleep} />
      <div className="chip-row" style={{ marginBottom: 12 }}>
        {[["all", "All"], ["feed", "🍼 Feeds"], ["sleep", "😴 Sleep"], ["diaper", "🚼 Diapers"], ["solid", "🥣 Solids"]].map(([k, label]) => (
          <button key={k} className={filter === k ? "chip active" : "chip"} onClick={() => setFilter(k)}>{label}</button>
        ))}
      </div>
      <GroupedTimeline items={merged} renderEntry={renderEntry} summarize={summarize} />
      {editing && (
        <Sheet onClose={() => setEditing(null)}>
          <EntryForm
            fields={HISTORY_KINDS[editing.kind].fields} initial={editing.item} title={`Edit ${HISTORY_KINDS[editing.kind].label}`}
            onCancel={() => setEditing(null)}
            onSave={(v) => { updateIn(HISTORY_KINDS[editing.kind].key)(v); setEditing(null); }}
            onDelete={(id) => { deleteFrom(HISTORY_KINDS[editing.kind].key)(id); setEditing(null); }}
          />
        </Sheet>
      )}
    </div>
  );
}

/* ---------- Growth: WHO percentile band charts + big-number trend cards ---------- */
function trendPerWeek(items, metric) {
  const p = [...items].filter((i) => i[metric] !== undefined && i[metric] !== null && i[metric] !== "")
    .sort((a, b) => String(a.date || "").localeCompare(String(b.date || "")));
  if (p.length < 2) return null;
  const a = p[p.length - 2], b = p[p.length - 1];
  const days = (new Date(b.date + "T00:00:00") - new Date(a.date + "T00:00:00")) / 86400000;
  if (days <= 0) return null;
  return (parseFloat(b[metric]) - parseFloat(a[metric])) / (days / 7);
}
function GrowthChart({ items, metric, color, profile }) {
  const isW = metric === "weight";
  const conv = profile.units === "metric" ? 1 : (isW ? KG_PER_LB : CM_PER_IN); // displayValue * conv = metric value
  const pts = [...items]
    .filter((i) => i[metric] !== undefined && i[metric] !== null && i[metric] !== "" && i.date)
    .sort((a, b) => String(a.date).localeCompare(String(b.date)))
    .map((p) => ({ date: p.date, v: parseFloat(p[metric]), t: new Date(p.date + "T00:00:00").getTime() }));
  if (pts.length < 2) return <p className="chart-empty">Add at least two measurements to see a trend.</p>;

  const t0 = pts[0].t, tN = pts[pts.length - 1].t, span = Math.max(1, tN - t0);
  const w = 330, h = 145, padL = 40, padR = 14, padT = 14, padB = 22;
  const iw = w - padL - padR, ih = h - padT - padB;
  const X = (t) => padL + ((t - t0) / span) * iw;

  let band = null;
  if (profile.sex && profile.dob) {
    const table = (isW ? WHO_WEIGHT_KG : WHO_HEIGHT_CM)[profile.sex];
    if (table) {
      const cv = isW ? 0.13 : 0.045, z = 1.2816; // 10th–90th percentile band
      band = pts.map((p) => {
        const m = monthsBetween(profile.dob, p.date);
        const med = interpWHO(table, m);
        const sd = med * cv;
        return { t: p.t, up: (med + z * sd) / conv, lo: (med - z * sd) / conv, med: med / conv };
      });
    }
  }

  const vals = pts.map((p) => p.v);
  let lo = Math.min(...vals), hi = Math.max(...vals);
  if (band) { lo = Math.min(lo, ...band.map((b) => b.lo)); hi = Math.max(hi, ...band.map((b) => b.up)); }
  const padV = (hi - lo || 1) * 0.08; lo -= padV; hi += padV;
  const Y = (v) => padT + (1 - (v - lo) / (hi - lo)) * ih;

  const linePts = pts.map((p) => `${X(p.t).toFixed(1)},${Y(p.v).toFixed(1)}`).join(" ");
  const last = pts[pts.length - 1];
  const gridVals = [lo + padV, (lo + hi) / 2, hi - padV];

  return (
    <svg viewBox={`0 0 ${w} ${h}`} width="100%" style={{ display: "block" }}>
      {gridVals.map((v, i) => (
        <g key={i}>
          <line x1={padL} x2={w - padR} y1={Y(v)} y2={Y(v)} stroke="var(--line)" strokeWidth="0.7" />
          <text x={padL - 5} y={Y(v) + 3.5} fontSize="9.5" fill="var(--ink-soft)" textAnchor="end">{v.toFixed(1)}</text>
        </g>
      ))}
      {band && (
        <>
          <polygon
            points={band.map((b) => `${X(b.t).toFixed(1)},${Y(b.up).toFixed(1)}`).join(" ") + " " + [...band].reverse().map((b) => `${X(b.t).toFixed(1)},${Y(b.lo).toFixed(1)}`).join(" ")}
            fill={color} opacity="0.11"
          />
          <polyline points={band.map((b) => `${X(b.t).toFixed(1)},${Y(b.med).toFixed(1)}`).join(" ")} fill="none" stroke={color} strokeWidth="1" strokeDasharray="4 4" opacity="0.4" />
        </>
      )}
      <polyline points={linePts} fill="none" stroke={color} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" />
      {pts.map((p, i) => <circle key={i} cx={X(p.t)} cy={Y(p.v)} r="3" fill={color} stroke="var(--paper)" strokeWidth="1.2" />)}
      <text x={Math.min(X(last.t), w - padR - 4)} y={Y(last.v) - 7} fontSize="10.5" fontWeight="700" fill={color} textAnchor="end">{last.v}</text>
      <text x={padL} y={h - 4} fontSize="9.5" fill="var(--ink-soft)">{fmtShortDate(pts[0].date)}</text>
      <text x={w - padR} y={h - 4} fontSize="9.5" fill="var(--ink-soft)" textAnchor="end">{fmtShortDate(last.date)}</text>
    </svg>
  );
}
function GrowthScreen({ items, data, profile, onAdd, onDelete }) {
  const [showForm, setShowForm] = useState(false);
  const sorted = useMemo(() => [...items].sort((a, b) => String(b.date || "").localeCompare(String(a.date || ""))), [items]);
  const wUnit = profile.units === "metric" ? "kg" : "lb";
  const hUnit = profile.units === "metric" ? "cm" : "in";
  const hasWeight = items.some((i) => i.weight);
  const hasHeight = items.some((i) => i.height);

  const latestW = [...items].filter((i) => i.weight).sort((a, b) => String(b.date).localeCompare(String(a.date)))[0];
  const latestH = [...items].filter((i) => i.height).sort((a, b) => String(b.date).localeCompare(String(a.date)))[0];
  const wKg = latestW ? parseFloat(latestW.weight) * (profile.units === "metric" ? 1 : KG_PER_LB) : null;
  const hCm = latestH ? parseFloat(latestH.height) * (profile.units === "metric" ? 1 : CM_PER_IN) : null;
  const wPct = latestW ? whoPercentile(wKg, monthsBetween(profile.dob, latestW.date), profile.sex, "weight") : null;
  const hPct = latestH ? whoPercentile(hCm, monthsBetween(profile.dob, latestH.date), profile.sex, "height") : null;
  const wTrend = trendPerWeek(items, "weight");
  const hTrend = trendPerWeek(items, "height");
  const trendLabel = (t, unit) => t == null ? "" : `${t >= 0 ? "↑" : "↓"} ${Math.abs(t).toFixed(t >= 1 ? 1 : 2)} ${unit}/wk`;

  /* Doctor report — configurable date range (picked each time) */
  const lastVisit = [...(data.health || [])].filter((h) => h.date).sort((a, b) => String(b.date).localeCompare(String(a.date)))[0];
  const defaultFrom = lastVisit ? lastVisit.date : localDateStr(new Date(Date.now() - 30 * 86400000));
  const [rangeFrom, setRangeFrom] = useState(defaultFrom);
  const [rangeTo, setRangeTo] = useState(todayStr());
  const rangeDays = Math.max(1, Math.round((dtFrom(rangeTo, "23:59") - dtFrom(rangeFrom, "00:00")) / 86400000) + 1);
  const statsRange = careStatsBetween(data, rangeFrom, rangeTo);
  const stats7 = careStats(data, 7);
  const stats30 = careStats(data, 30);
  const reactions = data.solids.filter((s) => s.reaction && s.reaction !== "None");
  const foodsTried = new Set(data.solids.map((s) => (s.food || "").toLowerCase().trim()).filter(Boolean)).size;
  const cutoff30 = new Date(); cutoff30.setDate(cutoff30.getDate() - 30);
  const recentSymptoms = [...data.symptoms].filter((s) => s.date && new Date(s.date + "T00:00:00") >= cutoff30).sort((a, b) => String(b.date).localeCompare(String(a.date)));
  const vaccinesGiven = [...data.vaccines].filter((v) => v.given).sort((a, b) => String(b.given).localeCompare(String(a.given)));
  const vaccinesUpcoming = data.vaccines.filter((v) => !v.given && v.scheduled);
  const perDay = (x) => (Math.round(x * 10) / 10).toFixed(1);

  return (
    <div className="screen">
      <div className="screen-head"><h2>📏 Growth</h2><Btn onClick={() => setShowForm(true)}>+ Add</Btn></div>

      {(latestW || latestH) && (
        <div className="stat-row">
          {latestW && (
            <Card>
              <div className="stat-label">Weight</div>
              <div className="stat-value">{latestW.weight} {wUnit}</div>
              <div className="stat-sub">{trendLabel(wTrend, wUnit)}{wPct ? ` · ≈${wPct}th pct` : ""}</div>
            </Card>
          )}
          {latestH && (
            <Card>
              <div className="stat-label">Height</div>
              <div className="stat-value">{latestH.height} {hUnit}</div>
              <div className="stat-sub">{trendLabel(hTrend, hUnit)}{hPct ? ` · ≈${hPct}th pct` : ""}</div>
            </Card>
          )}
        </div>
      )}

      {(hasWeight || hasHeight) && (
        <Card>
          {hasWeight && (
            <>
              <div className="stat-label">Weight ({wUnit})</div>
              <GrowthChart items={items} metric="weight" color="#B96F1F" profile={profile} />
            </>
          )}
          {hasHeight && (
            <>
              <div className="stat-label" style={{ marginTop: hasWeight ? 12 : 0 }}>Height ({hUnit})</div>
              <GrowthChart items={items} metric="height" color="#5F7A5A" profile={profile} />
            </>
          )}
          {profile.sex && profile.dob && <p className="rule-note">The shaded band is the approximate WHO 10th–90th percentile range for {profile.name || "baby"}'s age — staying anywhere inside it, on a steady curve, is what pediatricians look for. Your pediatrician's chart is the accurate one.</p>}
          {!profile.sex && (hasWeight || hasHeight) && <p className="rule-note">Add baby's sex and birthdate in Profile to see the WHO percentile band behind the curve.</p>}
        </Card>
      )}

      <Card>
        <div className="item-title">🖨️ Doctor visit report</div>
        <p className="rule-note" style={{ margin: "6px 0 10px" }}>A one-page summary of growth, feeding, sleep, diapers, food reactions, symptoms, and vaccines — print it or save as a PDF before checkups.</p>
        <div className="row" style={{ gap: 8, marginBottom: 8 }}>
          <label className="field" style={{ flex: 1 }}><span>From</span><input type="date" value={rangeFrom} max={rangeTo} onChange={(e) => setRangeFrom(e.target.value)} /></label>
          <label className="field" style={{ flex: 1 }}><span>To</span><input type="date" value={rangeTo} min={rangeFrom} max={todayStr()} onChange={(e) => setRangeTo(e.target.value)} /></label>
        </div>
        <div className="chip-row" style={{ marginBottom: 10 }}>
          {lastVisit && <button className="chip" onClick={() => { setRangeFrom(lastVisit.date); setRangeTo(todayStr()); }}>Since last visit</button>}
          <button className="chip" onClick={() => { setRangeFrom(localDateStr(new Date(Date.now() - 30 * 86400000))); setRangeTo(todayStr()); }}>Last 30 days</button>
          <button className="chip" onClick={() => { setRangeFrom(localDateStr(new Date(Date.now() - 90 * 86400000))); setRangeTo(todayStr()); }}>Last 90 days</button>
        </div>
        <Btn variant="ghost" full onClick={() => window.print()}>Print / save PDF ({rangeDays} day{rangeDays === 1 ? "" : "s"})</Btn>
      </Card>

      {sorted.length === 0 && <EmptyState text="No growth measurements yet." />}
      <div className="list">
        {sorted.map((item) => (
          <Card key={item.id}>
            <div className="row">
              <div className="grow">
                <div className="item-title">
                  {[item.weight && `${item.weight} ${wUnit}`, item.height && `${item.height} ${hUnit}`, item.headCirc && `${item.headCirc} ${hUnit} hc`]
                    .filter(Boolean).join(" · ") || "Measurement"}
                </div>
                <div className="item-sub">{fmtDate(item.date)}</div>
              </div>
              <IconBtn variant="danger" onClick={() => onDelete(item.id)}>✕</IconBtn>
            </div>
            {item.notes && <div className="item-notes">{item.notes}</div>}
          </Card>
        ))}
      </div>

      {showForm && (
        <Sheet onClose={() => setShowForm(false)}>
          <EntryForm fields={GROWTH_FIELDS} title="Add growth measurement" onCancel={() => setShowForm(false)} onSave={(v) => { onAdd(v); setShowForm(false); }} />
        </Sheet>
      )}

      <div className="print-summary">
        <h1>{profile.name || "Baby"} — pediatric visit summary</h1>
        <p>DOB {fmtDate(profile.dob) || "—"} · {ageString(profile.dob)} · Printed {fmtDate(todayStr())}{profile.carePlan ? ` · ${profile.carePlan}` : ""}</p>
        <p>Reporting period: {fmtDate(rangeFrom)} – {fmtDate(rangeTo)} ({rangeDays} days){lastVisit && rangeFrom === lastVisit.date ? " · since last recorded visit" : ""}</p>

        <p style={{ fontSize: 12, lineHeight: 1.5 }}>
          Over this period, {profile.name || "baby"} averaged <strong>{perDay(statsRange.feedsPerDay)} feeds/day</strong>
          {statsRange.avgFeedMin ? ` (~${Math.round(statsRange.avgFeedMin)} min/nursing)` : ""}
          {statsRange.avgBottleOz ? ` and ~${statsRange.avgBottleOz.toFixed(1)} oz/bottle` : ""},
          <strong> {durLabel(Math.round(statsRange.sleepMinPerDay)) || "0m"} sleep/day</strong>
          {statsRange.longestSleepMin ? ` (longest stretch ${durLabel(statsRange.longestSleepMin)})` : ""},
          and <strong>{perDay(statsRange.wetPerDay)} wet / {perDay(statsRange.dirtyPerDay)} dirty diapers/day</strong>.
        </p>

        <h3>Daily care summary (averages per day)</h3>
        <table className="print-table">
          <thead><tr><th></th><th>Selected range ({rangeDays}d)</th><th>Last 30 days</th></tr></thead>
          <tbody>
            <tr><td>Feeds per day</td><td>{perDay(statsRange.feedsPerDay)} ({perDay(statsRange.nursingPerDay)} nursing · {perDay(statsRange.bottlesPerDay)} bottle)</td><td>{perDay(stats30.feedsPerDay)} ({perDay(stats30.nursingPerDay)} nursing · {perDay(stats30.bottlesPerDay)} bottle)</td></tr>
            <tr><td>Avg nursing length</td><td>{statsRange.avgFeedMin ? `${Math.round(statsRange.avgFeedMin)} min` : "—"}</td><td>{stats30.avgFeedMin ? `${Math.round(stats30.avgFeedMin)} min` : "—"}</td></tr>
            <tr><td>Avg bottle amount</td><td>{statsRange.avgBottleOz ? `${statsRange.avgBottleOz.toFixed(1)} oz` : "—"}</td><td>{stats30.avgBottleOz ? `${stats30.avgBottleOz.toFixed(1)} oz` : "—"}</td></tr>
            <tr><td>Sleep per day</td><td>{durLabel(Math.round(statsRange.sleepMinPerDay)) || "0m"}</td><td>{durLabel(Math.round(stats30.sleepMinPerDay)) || "0m"}</td></tr>
            <tr><td>Longest sleep stretch</td><td>{statsRange.longestSleepMin ? durLabel(statsRange.longestSleepMin) : "—"}</td><td>{stats30.longestSleepMin ? durLabel(stats30.longestSleepMin) : "—"}</td></tr>
            <tr><td>Wet diapers per day</td><td>{perDay(statsRange.wetPerDay)}</td><td>{perDay(stats30.wetPerDay)}</td></tr>
            <tr><td>Dirty diapers per day</td><td>{perDay(statsRange.dirtyPerDay)}</td><td>{perDay(stats30.dirtyPerDay)}</td></tr>
          </tbody>
        </table>

        <h3>Growth</h3>
        {(latestW || latestH) && (
          <p>
            {latestW ? `Latest weight: ${latestW.weight} ${wUnit} (${fmtDate(latestW.date)})${wPct ? ` · ≈${wPct}th percentile` : ""}` : ""}
            {latestW && latestH ? " — " : ""}
            {latestH ? `Latest height: ${latestH.height} ${hUnit} (${fmtDate(latestH.date)})${hPct ? ` · ≈${hPct}th percentile` : ""}` : ""}
          </p>
        )}
        {hasWeight && (<><h3>Weight ({wUnit})</h3><GrowthChart items={items} metric="weight" color="#B96F1F" profile={profile} /></>)}
        {hasHeight && (<><h3>Height ({hUnit})</h3><GrowthChart items={items} metric="height" color="#5F7A5A" profile={profile} /></>)}
        {sorted.length > 0 && (
          <table className="print-table">
            <thead><tr><th>Date</th><th>Weight ({wUnit})</th><th>Height ({hUnit})</th><th>Head circ. ({hUnit})</th><th>Notes</th></tr></thead>
            <tbody>
              {sorted.map((item) => (
                <tr key={item.id}><td>{fmtDate(item.date)}</td><td>{item.weight || ""}</td><td>{item.height || ""}</td><td>{item.headCirc || ""}</td><td>{item.notes || ""}</td></tr>
              ))}
            </tbody>
          </table>
        )}

        <h3>Foods &amp; reactions</h3>
        <p>{foodsTried} food{foodsTried === 1 ? "" : "s"} introduced so far.</p>
        {reactions.length > 0 ? (
          <table className="print-table">
            <thead><tr><th>Food</th><th>Date</th><th>Reaction</th><th>Notes</th></tr></thead>
            <tbody>{reactions.map((s) => (<tr key={s.id}><td>{s.food}</td><td>{fmtDate(s.date)}</td><td>{s.reaction}</td><td>{s.notes || ""}</td></tr>))}</tbody>
          </table>
        ) : <p>No adverse food reactions recorded.</p>}

        <h3>Symptoms (last 30 days)</h3>
        {recentSymptoms.length > 0 ? (
          <table className="print-table">
            <thead><tr><th>Date</th><th>Type</th><th>Severity</th><th>Temp</th><th>Notes</th></tr></thead>
            <tbody>{recentSymptoms.map((s) => (<tr key={s.id}><td>{fmtDate(s.date)}</td><td>{s.type || ""}</td><td>{s.severity || ""}</td><td>{s.temp ? `${s.temp}°F` : ""}</td><td>{s.notes || ""}</td></tr>))}</tbody>
          </table>
        ) : <p>None recorded.</p>}

        <h3>Vaccines</h3>
        {vaccinesGiven.length > 0 ? <p>Given: {vaccinesGiven.map((v) => `${v.name} (${fmtDate(v.given)})`).join("; ")}</p> : <p>None recorded as given.</p>}
        {vaccinesUpcoming.length > 0 && <p>Scheduled: {vaccinesUpcoming.map((v) => `${v.name} (${fmtDate(v.scheduled)})`).join("; ")}</p>}

        <p style={{ fontStyle: "italic" }}>Prepared with Little Foot. Growth percentiles are WHO-based estimates, for reference only.</p>
      </div>
    </div>
  );
}

/* ---------- Profile ---------- */
function ProfileScreen({ profile, onSave, deviceParent, setDeviceParent, onExport, onImport }) {
  const [vals, setVals] = useState(profile);
  useEffect(() => setVals(profile), [profile]);
  const set = (k, v) => setVals((s) => ({ ...s, [k]: v }));
  const p1 = vals.parent1 || "Parent 1", p2 = vals.parent2 || "Parent 2";

  function handleImportFile(e) {
    const f = e.target.files[0];
    if (!f) return;
    const r = new FileReader();
    r.onload = () => {
      try {
        const parsed = JSON.parse(r.result);
        if (!confirm("Replace all current data with this backup? This can't be undone.")) return;
        onImport(parsed);
      } catch (err) {
        alert("That file isn't a valid Little Foot backup.");
      }
    };
    r.readAsText(f);
    e.target.value = "";
  }

  return (
    <div className="screen">
      <div className="screen-head"><h2>👤 Profile</h2></div>
      <div className="card">
        <label className="field"><span>Baby's name</span><input value={vals.name || ""} onChange={(e) => set("name", e.target.value)} /></label>
        <label className="field"><span>Date of birth</span><input type="date" value={vals.dob || ""} onChange={(e) => set("dob", e.target.value)} /></label>
        <label className="field">
          <span>Sex (for growth percentile estimates)</span>
          <select value={vals.sex || ""} onChange={(e) => set("sex", e.target.value)}>
            <option value="">Prefer not to say</option>
            <option value="boy">Boy</option>
            <option value="girl">Girl</option>
          </select>
        </label>
        <label className="field"><span>Blood type</span><input value={vals.bloodType || ""} onChange={(e) => set("bloodType", e.target.value)} /></label>
        <label className="field"><span>Parent 1 name</span><input value={vals.parent1 || ""} onChange={(e) => set("parent1", e.target.value)} /></label>
        <label className="field"><span>Parent 2 name</span><input value={vals.parent2 || ""} onChange={(e) => set("parent2", e.target.value)} /></label>
        <label className="field">
          <span>This phone belongs to (tags who logged each entry)</span>
          <select value={deviceParent || ""} onChange={(e) => setDeviceParent(e.target.value)}>
            <option value="">Not set</option>
            <option value={p1}>{p1}</option>
            <option value={p2}>{p2}</option>
          </select>
        </label>
        <label className="field"><span>Care plan &amp; notes (the Guide reads this)</span><textarea rows={2} value={vals.carePlan || ""} onChange={(e) => set("carePlan", e.target.value)} /></label>
        <label className="field">
          <span>Units</span>
          <select value={vals.units || "imperial"} onChange={(e) => set("units", e.target.value)}>
            <option value="imperial">Imperial (lb / in)</option>
            <option value="metric">Metric (kg / cm)</option>
          </select>
        </label>
        <label className="field">
          <span>Feeding interval (hours) — drives reminders &amp; "next feed" on Today</span>
          <input type="number" value={vals.reminderHours ?? 3} onChange={(e) => set("reminderHours", e.target.value)} />
        </label>
        <div className="field-group-label">Daily targets (for Today's progress bars)</div>
        <label className="field"><span>Expected sleep (hours/day)</span><input type="number" value={vals.expectedSleepHours ?? 14} onChange={(e) => set("expectedSleepHours", e.target.value)} /></label>
        <label className="field"><span>Expected diapers/day</span><input type="number" value={vals.expectedDiapers ?? 6} onChange={(e) => set("expectedDiapers", e.target.value)} /></label>
        <label className="field"><span>Expected feeds/day</span><input type="number" value={vals.expectedFeeds ?? 8} onChange={(e) => set("expectedFeeds", e.target.value)} /></label>
        <Btn full onClick={() => onSave(vals)}>Save profile</Btn>
      </div>

      <div className="card">
        <div className="field-group-label" style={{ margin: "0 0 8px" }}>Your data</div>
        <p className="rule-note" style={{ margin: "0 0 10px" }}>A safety copy is saved on this device automatically once a day. Download a backup file any time and keep it somewhere safe.</p>
        <Btn variant="ghost" full onClick={onExport}>⬇️ Download backup (JSON)</Btn>
        <label className="field" style={{ marginTop: 10 }}>
          <span>Restore from a backup file</span>
          <input type="file" accept="application/json,.json" onChange={handleImportFile} />
        </label>
      </div>
    </div>
  );
}

/* ---------- Journal (custom: author select + photo) ---------- */
function JournalScreen({ items, profile, onAdd, onDelete }) {
  const [showForm, setShowForm] = useState(false);
  const [vals, setVals] = useState({ date: "", author: "", otherName: "", text: "", photo: null });
  const sorted = useMemo(() => [...items].sort((a, b) => String(b.date || "").localeCompare(String(a.date || ""))), [items]);

  function handlePhoto(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      const img = new Image();
      img.onload = () => {
        const scale = Math.min(1, 700 / img.width);
        const canvas = document.createElement("canvas");
        canvas.width = img.width * scale;
        canvas.height = img.height * scale;
        const ctx = canvas.getContext("2d");
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        setVals((s) => ({ ...s, photo: canvas.toDataURL("image/jpeg", 0.7) }));
      };
      img.src = reader.result;
    };
    reader.readAsDataURL(file);
  }

  return (
    <div className="screen">
      <div className="screen-head">
        <h2>📓 Journal</h2>
        <Btn onClick={() => { setVals({ date: todayStr(), author: "", otherName: "", text: "", photo: null }); setShowForm(true); }}>+ Add</Btn>
      </div>
      {sorted.length === 0 && <EmptyState text="No journal entries yet. Capture your first memory together." />}
      <div className="list">
        {sorted.map((item) => (
          <Card key={item.id}>
            <div className="row">
              <div className="grow">
                <div className="item-title">{item.author === "Other" && item.otherName ? item.otherName : (item.author || "—")}</div>
                <div className="item-sub">{fmtDate(item.date)}</div>
              </div>
              <IconBtn variant="danger" onClick={() => onDelete(item.id)}>✕</IconBtn>
            </div>
            {item.photo && <img src={item.photo} className="journal-photo" alt="" />}
            {item.text && <div className="item-notes">{item.text}</div>}
          </Card>
        ))}
      </div>
      {showForm && (
        <Sheet onClose={() => setShowForm(false)}>
          <div className="sheet-head"><h3>Add journal entry</h3><IconBtn onClick={() => setShowForm(false)}>✕</IconBtn></div>
          <div className="sheet-body">
            <label className="field"><span>Date</span><input type="date" value={vals.date} onChange={(e) => setVals((s) => ({ ...s, date: e.target.value }))} /></label>
            <label className="field">
              <span>Who's writing?</span>
              <select value={vals.author} onChange={(e) => setVals((s) => ({ ...s, author: e.target.value }))}>
                <option value="">Select…</option>
                <option value="Mom">Mom</option>
                <option value="Dad">Dad</option>
                <option value="Other">Other</option>
              </select>
            </label>
            {vals.author === "Other" && (
              <label className="field"><span>Name</span><input value={vals.otherName} onChange={(e) => setVals((s) => ({ ...s, otherName: e.target.value }))} /></label>
            )}
            <label className="field"><span>Entry</span><textarea rows={4} value={vals.text} onChange={(e) => setVals((s) => ({ ...s, text: e.target.value }))} /></label>
            <label className="field"><span>Photo (optional)</span><input type="file" accept="image/*" onChange={handlePhoto} /></label>
            {vals.photo && <img src={vals.photo} className="journal-photo" alt="" />}
          </div>
          <div className="sheet-actions">
            <Btn variant="ghost" onClick={() => setShowForm(false)}>Cancel</Btn>
            <Btn onClick={() => { if (!vals.text) return alert("Please write something first."); onAdd({ ...vals, id: uid() }); setShowForm(false); }}>Save</Btn>
          </div>
        </Sheet>
      )}
    </div>
  );
}

function ContractionScreen({ items, onAdd, onDelete }) {
  const [active, setActive] = useState(null);
  const [, setTick] = useState(0);
  useEffect(() => {
    if (!active) return;
    const t = setInterval(() => setTick((x) => x + 1), 1000);
    return () => clearInterval(t);
  }, [active]);

  const sorted = useMemo(() => [...items].sort((a, b) => String(b.start || "").localeCompare(String(a.start || ""))), [items]);

  function start() { setActive({ start: new Date().toISOString() }); }
  function stop() {
    const end = new Date().toISOString();
    const durationSec = Math.max(1, Math.round((new Date(end) - new Date(active.start)) / 1000));
    onAdd({ id: uid(), start: active.start, end, durationSec });
    setActive(null);
  }

  const recentHour = sorted.filter((c) => Date.now() - new Date(c.start).getTime() <= 60 * 60 * 1000);
  let ruleMessage = null;
  if (recentHour.length >= 4) {
    const gaps = [];
    for (let i = 0; i < recentHour.length - 1; i++) gaps.push((new Date(recentHour[i].start) - new Date(recentHour[i + 1].start)) / 60000);
    const avgGap = gaps.reduce((a, b) => a + b, 0) / gaps.length;
    const avgDur = recentHour.reduce((a, c) => a + (c.durationSec || 0), 0) / recentHour.length;
    if (avgGap <= 5 && avgDur >= 60) ruleMessage = "Contractions are about 5 minutes apart and lasting a minute or more — this matches the 5-1-1 rule. Consider calling your provider.";
  }

  return (
    <div className="screen">
      {ruleMessage && <div className="hint-banner urgent">⚠️ {ruleMessage}</div>}
      <Card>
        {active ? (
          <div className="row">
            <div className="grow">
              <div className="item-title">Timing… {durLabel(Math.round((Date.now() - new Date(active.start).getTime()) / 60000))}</div>
              <div className="item-sub">Started {new Date(active.start).toLocaleTimeString()}</div>
            </div>
            <Btn variant="danger" onClick={stop}>Stop</Btn>
          </div>
        ) : (
          <div className="row">
            <div className="grow"><div className="item-title">Not timing a contraction</div></div>
            <Btn onClick={start}>Start</Btn>
          </div>
        )}
      </Card>
      <p className="rule-note">The 5-1-1 rule: contractions 5 minutes apart, lasting 1 minute each, for at least an hour — a common sign it's time to head in. Always follow your provider's specific guidance.</p>
      {sorted.length === 0 && <EmptyState text="No contractions logged yet." />}
      <div className="list">
        {sorted.map((c, i) => {
          const gap = i < sorted.length - 1 ? Math.round((new Date(c.start) - new Date(sorted[i + 1].start)) / 60000) : null;
          return (
            <Card key={c.id}>
              <div className="row">
                <div className="grow">
                  <div className="item-title">{new Date(c.start).toLocaleTimeString()}{c.durationSec ? ` · ${c.durationSec}s` : ""}</div>
                  <div className="item-sub">{gap != null ? `${gap} min since previous` : "First logged"}</div>
                </div>
                <IconBtn variant="danger" onClick={() => onDelete(c.id)}>✕</IconBtn>
              </div>
            </Card>
          );
        })}
      </div>
    </div>
  );
}

/* ---------- Guide: weekly age-tailored tips, what worked / didn't, and chat ---------- */
function buildGuideContext(data) {
  const { profile } = data;
  const s7 = careStats(data, 7);
  const latestW = [...data.growth].filter((i) => i.weight).sort((a, b) => String(b.date).localeCompare(String(a.date)))[0];
  const wKg = latestW ? parseFloat(latestW.weight) * (profile.units === "metric" ? 1 : KG_PER_LB) : null;
  const wPct = latestW ? whoPercentile(wKg, monthsBetween(profile.dob, latestW.date), profile.sex, "weight") : null;
  const foods = {};
  data.solids.forEach((s) => { if (s.food) foods[s.food.toLowerCase().trim()] = s.reaction && s.reaction !== "None" ? s.reaction : "ok"; });
  const foodList = Object.entries(foods).map(([f, r]) => (r === "ok" ? f : `${f} (${r} reaction)`)).join(", ") || "none yet";
  const milestones = [...data.milestones].sort((a, b) => String(b.date || "").localeCompare(String(a.date || ""))).slice(0, 6).map((m) => `${m.title} (${m.date})`).join("; ") || "none logged";
  const learnings = [...data.learnings].sort((a, b) => String(b.date || "").localeCompare(String(a.date || ""))).slice(0, 12).map((l) => `${l.verdict}: ${l.text}`).join("; ") || "none yet";
  return `Baby: ${profile.name || "unnamed"}, ${ageString(profile.dob) || "age unknown"} (DOB ${profile.dob || "unknown"}).
Parents' care plan/notes: ${profile.carePlan || "none"}.
Last 7 days, per day: ${s7.feedsPerDay.toFixed(1)} feeds (${s7.nursingPerDay.toFixed(1)} nursing, ${s7.bottlesPerDay.toFixed(1)} bottle), avg nursing ${s7.avgFeedMin ? Math.round(s7.avgFeedMin) + " min" : "n/a"}; sleep ${durLabel(Math.round(s7.sleepMinPerDay)) || "0m"}/day (longest stretch ${s7.longestSleepMin ? durLabel(s7.longestSleepMin) : "n/a"}); ${s7.wetPerDay.toFixed(1)} wet + ${s7.dirtyPerDay.toFixed(1)} dirty diapers/day.
Latest weight: ${latestW ? `${latestW.weight} ${profile.units === "metric" ? "kg" : "lb"} on ${latestW.date}${wPct ? ` (~${wPct}th percentile)` : ""}` : "not logged"}.
Foods tried: ${foodList}.
Recent milestones: ${milestones}.
What the parents found worked / didn't work: ${learnings}.
Currently sleeping: ${data.activeSleep ? "yes" : "no"}.`;
}
async function generateGuideTips(apiKey, data) {
  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-api-key": apiKey,
      "anthropic-version": "2023-06-01",
      "anthropic-dangerous-direct-browser-access": "true",
    },
    body: JSON.stringify({
      model: "claude-sonnet-4-6",
      max_tokens: 1200,
      system: `You are a warm, evidence-informed infant-care guide for tired parents. You are not a doctor: keep every suggestion safe, mainstream (AAP/WHO-aligned), and age-appropriate, and defer to the pediatrician for anything medical. Tailor tightly to the baby's exact age and the data provided: respect the parents' care plan, build on what they said worked, avoid what didn't, and only suggest solids/new foods when age-appropriate (noting foods not yet tried). Cover a mix across development & play, feeding (what to expect next), sleep, and one outing or activity idea. Respond with ONLY a JSON array (no markdown fences) of 4 to 6 objects: [{"title": "short imperative title", "body": "2-3 practical sentences"}].`,
      messages: [{ role: "user", content: `Here is our baby's data. Please write this week's guide.\n\n${buildGuideContext(data)}` }],
    }),
  });
  const json = await res.json();
  const text = (json.content || []).filter((b) => b.type === "text").map((b) => b.text).join("\n");
  const clean = text.replace(/```json|```/g, "").trim();
  const arr = JSON.parse(clean.slice(clean.indexOf("["), clean.lastIndexOf("]") + 1));
  if (!Array.isArray(arr)) throw new Error("Unexpected guide format");
  return arr.filter((t) => t && t.title && t.body).slice(0, 6);
}
function GuideScreen({ data, update, onAddLearning, onDeleteLearning }) {
  const profile = data.profile;
  const [apiKey, setApiKey] = useState(() => localStorage.getItem("lf_api_key") || "");
  const [messages, setMessages] = useState([]);
  const [input, setInput] = useState("");
  const [loading, setLoading] = useState(false);
  const [tipsLoading, setTipsLoading] = useState(false);
  const [learnText, setLearnText] = useState("");

  function saveKey(k) { setApiKey(k); localStorage.setItem("lf_api_key", k); }

  async function refreshTips() {
    if (!apiKey) { alert("Add your Anthropic API key above first."); return; }
    setTipsLoading(true);
    try {
      const tips = await generateGuideTips(apiKey, data);
      update({ advisor: { lastRun: new Date().toISOString(), ageAtRun: ageString(profile.dob), tips } });
    } catch (e) {
      alert("Couldn't generate the guide — check your API key and connection.");
    }
    setTipsLoading(false);
  }

  function addLearning(verdict) {
    if (!learnText.trim()) return;
    onAddLearning({ id: uid(), date: todayStr(), text: learnText.trim(), verdict });
    setLearnText("");
  }

  async function send(text) {
    if (!apiKey) { alert("Add your Anthropic API key above first."); return; }
    const next = [...messages, { role: "user", content: text }];
    setMessages(next); setInput(""); setLoading(true);
    try {
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "x-api-key": apiKey,
          "anthropic-version": "2023-06-01",
          "anthropic-dangerous-direct-browser-access": "true",
        },
        body: JSON.stringify({
          model: "claude-sonnet-4-6",
          max_tokens: 600,
          system: `You are a calm, practical, evidence-informed assistant helping tired parents with a newborn. You are not a doctor — recommend the pediatrician for anything medical. Baby data:\n${buildGuideContext(data)}`,
          messages: next,
        }),
      });
      const json = await res.json();
      const reply = (json.content || []).filter((b) => b.type === "text").map((b) => b.text).join("\n") || "Sorry, I couldn't get a response.";
      setMessages((m) => [...m, { role: "assistant", content: reply }]);
    } catch (e) {
      setMessages((m) => [...m, { role: "assistant", content: "Something went wrong reaching Claude. Check your API key and connection." }]);
    }
    setLoading(false);
  }

  const tips = (data.advisor && data.advisor.tips) || [];
  const learnings = [...data.learnings].sort((a, b) => String(b.date || "").localeCompare(String(a.date || "")));

  return (
    <div className="screen">
      <div className="screen-head"><h2>🧭 Guide</h2></div>
      {!apiKey && (
        <Card>
          <p className="rule-note">Bring your own Anthropic API key (from console.anthropic.com) to power the Guide. It's stored only in this browser — never synced through Supabase — but anyone using this device could view it, so consider a key with a small spend limit.</p>
          <label className="field"><span>Anthropic API key</span><input type="password" defaultValue={apiKey} onBlur={(e) => saveKey(e.target.value)} placeholder="sk-ant-..." /></label>
        </Card>
      )}

      <Card>
        <div className="log-card-head">
          <div className="item-title">💡 This week's guide</div>
          <button className="link-btn" onClick={refreshTips} disabled={tipsLoading}>{tipsLoading ? "Thinking…" : "↻ Refresh"}</button>
        </div>
        {tips.length === 0 && (
          <div className="item-sub">{tipsLoading ? "Reading this week's data and writing your guide…" : "Tap Refresh to get age-tailored tips built from this week's feeding, sleep, food, and milestone data. It also refreshes itself weekly when you open the app."}</div>
        )}
        {tips.map((t, i) => (
          <div key={i} className="tip">
            <div className="tip-title">{t.title}</div>
            <div className="tip-body">{t.body}</div>
          </div>
        ))}
        {data.advisor && data.advisor.lastRun && (
          <p className="rule-note">Updated {fmtDate(data.advisor.lastRun.slice(0, 10))}{data.advisor.ageAtRun ? ` · ${data.advisor.ageAtRun}` : ""}. General guidance, not medical advice — check with your pediatrician.</p>
        )}
      </Card>

      <Card>
        <div className="log-card-head"><div className="item-title">📌 What worked / what didn't</div></div>
        <p className="rule-note" style={{ margin: "0 0 9px" }}>Jot down wins and misses — the guide and chat read these, so you never repeat a failed experiment.</p>
        <input className="grow" style={{ width: "100%", border: "1px solid var(--line)", borderRadius: 10, padding: "10px 11px", background: "var(--cream)", fontSize: 15, marginBottom: 8 }} placeholder="e.g. white noise + football hold at bedtime" value={learnText} onChange={(e) => setLearnText(e.target.value)} />
        <div className="quick-actions">
          <Btn variant="ghost" onClick={() => addLearning("Worked")}>👍 Worked</Btn>
          <Btn variant="ghost" onClick={() => addLearning("Didn't work")}>👎 Didn't work</Btn>
        </div>
        {learnings.slice(0, 10).map((l) => (
          <div className="learn-row" key={l.id} style={{ marginTop: 8 }}>
            <span>{l.verdict === "Worked" ? "👍" : "👎"}</span>
            <div className="grow">
              <div style={{ fontSize: 14 }}>{l.text}</div>
              <div className="item-sub" style={{ fontSize: 11 }}>{fmtDate(l.date)}</div>
            </div>
            <IconBtn variant="danger" onClick={() => onDeleteLearning(l.id)}>✕</IconBtn>
          </div>
        ))}
      </Card>

      <Card>
        <div className="log-card-head"><div className="item-title">💬 Ask anything</div></div>
        <div className="chat-log">
          {messages.map((m, i) => <div key={i} className={m.role === "user" ? "chat-bubble user" : "chat-bubble assistant"}>{m.content}</div>)}
          {loading && <div className="chat-bubble assistant">…</div>}
        </div>
        <div className="quick-actions" style={{ marginBottom: 10 }}>
          <Btn variant="ghost" onClick={() => send("The baby is crying right now — any ideas why, given the recent stats?")}>⚡ Crying now</Btn>
          <Btn variant="ghost" onClick={() => send("Based on her age and what she's tried, what foods or feeding changes should we consider next?")}>🥣 Feeding next</Btn>
        </div>
        <div className="row">
          <input className="grow" style={{ border: "1px solid var(--line)", borderRadius: 10, padding: "10px 11px", background: "var(--cream)", fontSize: 15 }} placeholder="Ask something…" value={input} onChange={(e) => setInput(e.target.value)} onKeyDown={(e) => e.key === "Enter" && input.trim() && send(input.trim())} />
          <Btn onClick={() => input.trim() && send(input.trim())} disabled={loading}>Send</Btn>
        </div>
      </Card>
    </div>
  );
}
